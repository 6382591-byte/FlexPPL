    *{box-sizing:border-box}html{background:var(--page)}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(179,18,27,.16),transparent 34%),linear-gradient(180deg,#050505,#090909 55%,#050505);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;letter-spacing:.01em}button,input,select,textarea{font:inherit}.app{max-width:760px;margin:auto;min-height:100vh;padding:14px 14px calc(104px + env(safe-area-inset-bottom));overflow-x:hidden}
    header{display:flex;justify-content:center;align-items:center;margin:0 0 14px;padding:8px 0}.brand{display:flex;justify-content:center;align-items:center;gap:10px;font-weight:850;font-size:22px;letter-spacing:.28em;text-indent:.28em}.brand img{width:34px;height:34px}.icon-btn{height:40px;width:40px;border-radius:12px;background:transparent;border:1px solid var(--line);color:var(--muted)}.pill{background:var(--surface);border:1px solid var(--line);padding:8px 11px;border-radius:999px;color:var(--muted);font-size:13px}.card{background:linear-gradient(180deg,rgba(23,23,25,.78),rgba(17,17,19,.98));border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 18px 38px rgba(0,0,0,.22)}.hero{padding:22px}.eyebrow,.section-title,.field-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.16em}.hero h1,h1{font-size:34px;margin:6px 0 8px;line-height:1}.muted{color:var(--muted)}.dim{color:var(--dim)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:13px 15px;font-weight:780;cursor:pointer;min-height:44px}.primary{background:linear-gradient(135deg,var(--redDark),var(--red2));color:white;border:1px solid #C31520}.secondary{background:var(--surface);color:var(--text);border:1px solid var(--line)}.danger{background:rgba(194,71,74,.13);color:#F0B1B3;border:1px solid rgba(194,71,74,.55)}.outline-red{background:transparent;color:#F1B6B9;border:1px solid var(--red)}.wide{width:100%}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:13px}.stat b{display:block;font-size:24px;line-height:1.1;margin-top:4px}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(11,11,12,.94);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:10;backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}.tabs .inner{width:min(760px,100%);display:grid;grid-template-columns:repeat(4,1fr)}.tab{background:none;border:0;color:var(--dim);padding:11px 5px 10px;font-size:12px}.tab svg{display:block;margin:0 auto 4px;stroke:currentColor}.tab.active{color:var(--red2)}
    .exercise{position:relative}.exercise h3{margin:0 84px 6px 0;font-size:21px}.target-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.target-num{font-size:30px;font-weight:850}.meta{font-size:14px;color:var(--muted)}.order-controls{position:absolute;top:14px;right:14px;display:flex;gap:6px}.order-controls button{width:36px;height:36px;padding:0}.entry-grid{display:grid;grid-template-columns:minmax(88px,1.2fr) repeat(3,minmax(0,1fr));gap:7px;margin-top:14px}.entry-grid label{min-width:0}.entry-grid input,select,input[type=number],input[type=text],textarea{min-width:0;width:100%;background:#09090A;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 7px;text-align:center;font-size:16px}textarea{text-align:left;min-height:120px}.status-first{border-left:3px solid var(--blue)}.status-repeat{border-left:3px solid var(--amber)}.status-increase{border-left:3px solid var(--green)}.status-reduce{border-left:3px solid var(--reduce)}.status-skipped{border-left:3px solid #57575f;opacity:.82}.status-skipped .done-title{color:#B8B8BE}.subline{font-size:12px;color:var(--muted);margin-top:2px}.text-link{background:none;border:0;color:var(--muted);text-decoration:underline;padding:0;min-height:0}.calc-icon{width:21px;height:21px;display:block;margin:auto;stroke:currentColor}.nearest-btn b{display:block}.swap-extra{margin-top:12px}.swap-card.less-exact{opacity:.9}.collapsed-done{padding:12px 14px;background:#0C0D0C}.done-summary{display:flex;justify-content:space-between;align-items:center;gap:12px}.done-title{font-weight:820}.completed-section{margin-top:18px}.completed-section summary{cursor:pointer;color:var(--muted);font-weight:700;padding:10px 2px}.mini{padding:9px 12px;border-radius:12px;min-height:38px}.hidden{display:none!important}.history-item{padding:13px 0;border-bottom:1px solid var(--line)}.history-item:last-child{border-bottom:0}.core-choice{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;background:#101812;color:#D9F0DF;padding:12px 16px;border-radius:12px;border:1px solid rgba(95,159,115,.55);display:none;z-index:40}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.76);display:flex;align-items:center;justify-content:center;padding:18px;z-index:30;backdrop-filter:blur(8px)}.modal{width:min(480px,100%);max-height:calc(100vh - 36px);overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.58)}.modal.full{width:min(720px,100%);height:calc(100vh - 24px);border-radius:24px;display:flex;flex-direction:column}.modal-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}.modal-head h2{margin:0;font-size:24px;letter-spacing:.06em}.swap-card{display:grid;grid-template-columns:86px 1fr;gap:13px;align-items:center;background:var(--elev);border:1px solid var(--line);border-radius:18px;padding:12px;text-align:left;color:var(--text);width:100%}.swap-card.best{border-color:var(--red);box-shadow:inset 0 0 0 1px rgba(179,18,27,.3)}.swap-card img{width:86px;height:58px;object-fit:cover;border-radius:12px;opacity:.78}.swap-card strong{display:block;font-size:19px}.swap-card span{display:block;color:var(--muted);font-size:13px;margin-top:3px}.calc-total{font-size:48px;font-weight:900;text-align:center}.plate-visual{display:flex;gap:6px;align-items:end;justify-content:center;min-height:62px}.plate-disc{width:28px;border-radius:6px;background:linear-gradient(180deg,#343438,#151517);border:1px solid #555;color:#ddd;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}.trend-wrap{overflow:hidden}.notes-list .history-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.modal h2{margin:0 0 8px}.modal-actions{display:grid;gap:12px;margin-top:18px}.busy-btn,.choice-btn{padding:18px 16px;text-align:left}.busy-btn strong,.choice-btn strong{display:block;font-size:21px}.busy-btn span,.choice-btn span{display:block;margin-top:4px;color:var(--muted);font-size:14px}.recommended,.choice-btn:first-child{border-color:var(--red);box-shadow:inset 0 0 0 1px rgba(179,18,27,.25)}.best-badge{display:inline-block;margin-bottom:8px;color:#F3C2C5;border:1px solid var(--red);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.1em}.weight-wrap{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:6px}.calc-btn{width:42px;height:42px;padding:0}.plate-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.plate-options button{border-radius:999px}.plate-options button.active{background:rgba(179,18,27,.24);border-color:var(--red);color:#fff}.plate-result{background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px}.plate-list{font-size:24px;font-weight:850;margin-top:4px}.note-preview{width:100%;font-size:13px;color:var(--muted);padding-top:2px}.chart{height:90px;width:100%;margin-top:10px}.wordmark{letter-spacing:.3em;text-indent:.3em}.vcheck{font-size:52px;color:var(--red2);text-align:center;line-height:1}.top-actions{display:flex;gap:8px}.progress-line{stroke:var(--red2);fill:none;stroke-width:2}.gridline{stroke:#252529;stroke-width:1}
    @media (max-width:520px){.app{padding-left:12px;padding-right:12px}.grid{grid-template-columns:1fr}.entry-grid{grid-template-columns:82px repeat(3,minmax(0,1fr));gap:6px}.entry-grid input{padding:11px 4px;font-size:15px}.hero h1,h1{font-size:29px}.brand{font-size:18px}.target-num{font-size:26px}.btn{padding-left:12px;padding-right:12px}.tab{font-size:11px}}

<body>
<div id="app" class="app"></div>
<div id="toast" class="toast"></div>
<div id="busyModal" class="modal-backdrop hidden" onclick="closeBusyModal()" role="presentation">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="busyModalTitle" onclick="event.stopPropagation()">
    <h2 id="busyModalTitle">How busy is the gym?</h2>
    <p class="muted">Choose a traffic level to set the exercise order.</p>
    <div class="modal-actions">
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('1')"><strong>Empty</strong><span>Use the normal exercise order.</span></button>
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('2')"><strong>Normal</strong><span>Use the normal exercise order.</span></button>
      <button class="btn primary busy-btn recommended" onclick="beginWorkoutWithBusy('3')"><strong>Packed</strong><span>Prioritize easier-to-access stations first.</span></button>
      <button class="btn secondary busy-btn" onclick="closeBusyModal()"><strong>Cancel</strong><span>Go back without starting.</span></button>
    </div>
  </div>
</div>
<div id="swapModal" class="modal-backdrop hidden" onclick="closeSwapModal()" role="presentation"></div>
<div id="plateModal" class="modal-backdrop hidden" onclick="closePlateModal()" role="presentation"></div>
<div id="quickInputModal" class="modal-backdrop hidden" onclick="closeQuickInputModal()" role="presentation"></div>
<div id="notesModal" class="modal-backdrop hidden" onclick="closeNotesModal()" role="presentation"></div>
<script>
const ROTATION=["Push A","Pull A","Legs A","Push B","Pull B","Legs B"];
const PROGRAM={

const EXERCISE_META={};
const META_DEFAULT={primaryMuscle:"General",secondaryMuscles:[],movementPattern:"General",equipmentType:"Bodyweight",type:"compound",substitutions:[]};

const LIBRARY_ROWS = [

['barbell-bent-over-row','Barbell Bent-Over Row',['Barbell Row'],'Upper back',['Lats','Biceps'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['pendlay-row','Pendlay Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['one-arm-barbell-row','One-Arm Barbell Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['meadows-row','Meadows Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['chest-supported-dumbbell-row','Chest-Supported Dumbbell Row',['Chest Supported Row','Chest-Supported Row'],'Upper back',['Lats'],'Horizontal pull','Dumbbell','compound','weighted','horizontal-pull','Both'],['chest-supported-barbell-row','Chest-Supported Barbell Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['one-arm-dumbbell-row','One-Arm Dumbbell Row',['One-Arm DB Row'],'Upper back',['Lats'],'Horizontal pull','Dumbbell','compound','weighted','horizontal-pull','Both'],['seated-cable-row','Seated Cable Row',[],'Upper back',['Lats'],'Horizontal pull','Cable','compound','weighted','horizontal-pull','Home'],['machine-row','Machine Row',[],'Upper back',['Lats'],'Horizontal pull','Machine','compound','weighted','horizontal-pull','Home'],['t-bar-row','T-Bar Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['seal-row','Seal Row',[],'Upper back',['Lats'],'Horizontal pull','Barbell','compound','weighted','horizontal-pull','Both'],['trap-bar-row','Trap-Bar Row',[],'Upper back',['Lats'],'Horizontal pull','Trap bar','compound','weighted','horizontal-pull','Both'],
['face-pull','Face Pull',[],'Rear delts',['Upper back'],'Rear delt pull','Cable','isolation','weighted','rear-delt','Home'],['rear-delt-dumbbell-fly','Rear-Delt Dumbbell Fly',['Rear-Delt Fly','Rear Delt Raise'],'Rear delts',['Upper back'],'Rear delt fly','Dumbbell','isolation','weighted','rear-delt','Both'],['chest-supported-rear-delt-raise','Chest-Supported Rear-Delt Raise',[],'Rear delts',['Upper back'],'Rear delt fly','Dumbbell','isolation','weighted','rear-delt','Both'],['reverse-pec-deck','Reverse Pec Deck',[],'Rear delts',['Upper back'],'Rear delt fly','Machine','isolation','weighted','rear-delt','Home'],['band-face-pull','Band Face Pull',[],'Rear delts',['Upper back'],'Rear delt pull','Resistance band','isolation','weighted','rear-delt','Home'],['band-pull-apart','Band Pull-Apart',[],'Rear delts',['Upper back'],'Rear delt pull','Resistance band','isolation','weighted','rear-delt','Home'],['wide-grip-barbell-row','Wide-Grip Barbell Row',[],'Rear delts',['Upper back'],'Horizontal pull','Barbell','compound','weighted','rear-delt','Both'],['prone-y-raise','Prone Y Raise',[],'Rear delts',['Upper back'],'Rear delt fly','Bodyweight','isolation','bodyweight','rear-delt','Both'],['plate-rear-delt-raise','Plate Rear-Delt Raise',[],'Rear delts',['Upper back'],'Rear delt fly','Plate','isolation','weighted','rear-delt','Both'],
['barbell-curl','Barbell Curl',['Bar Curl'],'Biceps',['Forearms'],'Curl','Barbell','isolation','weighted','curl','Both'],['ez-bar-curl','EZ-Bar Curl',['EZ Bar Curl'],'Biceps',['Forearms'],'Curl','Barbell','isolation','weighted','curl','Home'],['dumbbell-curl','Dumbbell Curl',['DB Curl'],'Biceps',['Forearms'],'Curl','Dumbbell','isolation','weighted','curl','Both'],['alternating-dumbbell-curl','Alternating Dumbbell Curl',['Alternating DB Curl'],'Biceps',['Forearms'],'Curl','Dumbbell','isolation','weighted','curl','Both'],['incline-dumbbell-curl','Incline Dumbbell Curl',['Incline DB Curl'],'Biceps',['Forearms'],'Curl','Dumbbell','isolation','weighted','curl','Both'],['hammer-curl','Hammer Curl',['DB Hammer Curl'],'Biceps',['Forearms'],'Neutral curl','Dumbbell','isolation','weighted','curl','Both'],['cross-body-hammer-curl','Cross-Body Hammer Curl',['Cross-Body Dumbbell Hammer Curl'],'Biceps',['Forearms'],'Neutral curl','Dumbbell','isolation','weighted','curl','Both'],['rope-hammer-curl','Rope Hammer Curl',[],'Biceps',['Forearms'],'Neutral curl','Cable','isolation','weighted','curl','Home'],['cable-curl','Cable Curl',[],'Biceps',['Forearms'],'Curl','Cable','isolation','weighted','curl','Home'],['bayesian-cable-curl','Bayesian Cable Curl',['Cable Bayesian Curl'],'Biceps',['Forearms'],'Curl','Cable','isolation','weighted','curl','Home'],['preacher-curl','Preacher Curl',[],'Biceps',['Forearms'],'Curl','Bench-supported','isolation','weighted','curl','Home'],['machine-curl','Machine Curl',[],'Biceps',['Forearms'],'Curl','Machine','isolation','weighted','curl','Home'],['reverse-barbell-curl','Reverse Barbell Curl',[],'Forearms',['Biceps'],'Reverse curl','Barbell','isolation','weighted','curl','Both'],['plate-curl','Plate Curl',[],'Biceps',['Forearms'],'Curl','Plate','isolation','weighted','curl','Both'],['kettlebell-curl','Kettlebell Curl',[],'Biceps',['Forearms'],'Curl','Kettlebell','isolation','weighted','curl','Both'],['kettlebell-hammer-curl','Kettlebell Hammer Curl',[],'Biceps',['Forearms'],'Neutral curl','Kettlebell','isolation','weighted','curl','Both'],['plate-pinch-curl','Plate Pinch Curl',[],'Forearms',['Biceps'],'Curl','Plate','isolation','weighted','curl','Both'],
['trap-bar-shrug','Trap-Bar Shrug',[],'Traps',['Grip'],'Shrug/carry','Trap bar','isolation','weighted','shrug-carry','Both'],['barbell-shrug','Barbell Shrug',[],'Traps',['Grip'],'Shrug/carry','Barbell','isolation','weighted','shrug-carry','Both'],['dumbbell-shrug','Dumbbell Shrug',[],'Traps',['Grip'],'Shrug/carry','Dumbbell','isolation','weighted','shrug-carry','Both'],['farmer-carry','Farmer Carry',[],'Traps',['Grip'],'Shrug/carry','Dumbbell','compound','weighted','shrug-carry','Both'],['suitcase-carry','Suitcase Carry',[],'Traps',['Grip'],'Shrug/carry','Kettlebell','compound','weighted','shrug-carry','Both']

const EXERCISE_LIBRARY=LIBRARY_ROWS.map(r=>({id:r[0],name:r[1],aliases:r[2],primaryMuscle:r[3],secondaryMuscles:r[4],movementPattern:r[5],equipmentType:r[6],type:r[7],loadType:r[8],image:`assets/exercises/${r[9]}.svg`,gymModes:r[10]}));
const EXERCISE_ALIASES={}; EXERCISE_LIBRARY.forEach(e=>[e.name,...e.aliases].forEach(n=>EXERCISE_ALIASES[String(n).toLowerCase()]=e.id));
function libraryByName(name){const id=EXERCISE_ALIASES[String(name||'').toLowerCase()]||slugifyExercise(name);return EXERCISE_LIBRARY.find(e=>e.id===id)}
function slugifyExercise(name){return String(name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"generic"}
function exerciseImage(name){return `assets/exercises/${slugifyExercise(name)}.svg`}
function inferMeta(name,subs=[]){
  const n=String(name).toLowerCase(); let m={...META_DEFAULT,substitutions:subs};
  if(/bench|press|fly|pec|push-up/.test(n)){m.primaryMuscle="Chest";m.secondaryMuscles=["Triceps","Shoulders"];m.movementPattern=/fly|pec/.test(n)?"Chest fly":"Horizontal press";m.equipmentType=/db|dumbbell/.test(n)?"Dumbbell":/cable|rope/.test(n)?"Cable":/smith/.test(n)?"Smith machine":/machine|pec/.test(n)?"Machine":/push-up/.test(n)?"Bodyweight":"Barbell";m.type=/fly/.test(n)?"isolation":"compound";}

function saveEditedWorkout(){
  const w=state.active;
  if(!w || w.editingIndex===undefined || w.editingIndex===null) return;
  w.items.forEach(x=>{
    if(x.done && Array.isArray(x.sets) && x.sets.every(v=>v!==null && v!=="")){
      const min=Math.min(...x.sets.map(Number));
      x.next=x.inc===0?x.weight:(min>=x.target?Number(x.weight)+Number(x.inc):Number(x.weight));
      x.coach=min>=x.target?(x.inc===0?"ADD REPS":"INCREASE"):"REPEAT";
    }
  });
  const index=w.editingIndex;
  delete w.editingIndex;
  state.history[index]=w;
  state.active=null;
  rebuildPerformance();
  save();
  page="history";
  render();
  toast("Workout updated");
}
function deleteHistory(index){
  if(!confirm("Delete this workout permanently?")) return;
  state.history.splice(index,1);
  rebuildPerformance();
  save();
  render();
}
function cancelWorkout(){
  const editing=state.active && state.active.editingIndex!==undefined;
  if(confirm(editing?"Close without saving changes?":"Discard active workout?")){
    state.active=null;save();render();
  }
}
function openQuickInput(title,label,type,action){
  quickInputAction=action;
  const modal=document.getElementById("quickInputModal");
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="quickInputTitle" onclick="event.stopPropagation()">
    <h2 id="quickInputTitle">${title}</h2>
    <label><span class="field-label">${label}</span><input id="quickInputValue" type="${type}" inputmode="${type==="number"?"decimal":"text"}" autofocus></label>
    <div class="modal-actions"><button class="btn primary wide" onclick="submitQuickInput()">Save</button><button class="btn secondary wide" onclick="closeQuickInputModal()">Cancel</button></div>
  </div>`;
  modal.classList.remove("hidden");
  setTimeout(()=>document.getElementById("quickInputValue")?.focus(),0);
}
function closeQuickInputModal(){
  quickInputAction=null;
  document.getElementById("quickInputModal").classList.add("hidden");
}
function submitQuickInput(){
  const v=document.getElementById("quickInputValue")?.value.trim();
  if(!v) return closeQuickInputModal();
  const action=quickInputAction;
  closeQuickInputModal();
  if(action==="bodyweight") state.bodyweight.unshift({date:today(),value:Number(v)});
  if(action==="gym"){state.customGyms.push(v);state.gym=v;}
  save();
  render();
}
function logBodyweight(){openQuickInput("Bodyweight","Weight","number","bodyweight")}
function addGym(){openQuickInput("Add gym","Gym name","text","gym")}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="vektr-backup.json";a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=normalizeState(JSON.parse(r.result));save();render();toast("Backup restored")}catch{toast("Invalid backup")}};r.readAsText(f)}
function resetData(){if(confirm("Delete all VEKTR data?")){localStorage.removeItem("flexppl");state=cloneDefault();render()}}
function navIcon(name){
  const icons={today:"M4 11h16M12 3v18M6 17l6 4 6-4",history:"M4 6h16M6 6v14h12V6M8 11h8M8 15h5",progress:"M4 18l5-5 4 3 7-9M4 21h16",settings:"M12 8a4 4 0 100 8 4 4 0 000-8zM4 12h2m12 0h2M12 4v2m0 12v2"};
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${icons[name]}"></path></svg>`;
}
function render(){document.getElementById("app").innerHTML=`
<header><div class="brand"><img src="icon.svg" alt="VEKTR logo"><span class="wordmark">VEKTR</span></div></header>
${page==="today"?renderToday():page==="history"?renderHistory():page==="progress"?renderProgress():renderSettings()}
<div class="tabs"><div class="inner">
<button class="tab ${page==="today"?"active":""}" onclick="page='today';render()">${navIcon("today")}Today</button>
<button class="tab ${page==="history"?"active":""}" onclick="page='history';render()">${navIcon("history")}History</button>
<button class="tab ${page==="progress"?"active":""}" onclick="page='progress';render()">${navIcon("progress")}Progress</button>
<button class="tab ${page==="settings"?"active":""}" onclick="page='settings';render()">${navIcon("settings")}Settings</button>
</div></div>`}
function renderToday(){
 if(!state.active){
   const last=state.history[0];
   const lastDate=last?new Date(last.date+"T12:00:00"):"";
   const daysAgo=last?Math.max(0,Math.floor((Date.now()-lastDate.getTime())/86400000)):null;
   const streak=state.history.reduce((n,w,i,a)=>{
     if(i===0)return 1;
     const d1=new Date(a[i-1].date+"T12:00:00"),d2=new Date(w.date+"T12:00:00");
     return (d1-d2)<=3*86400000?n+1:n;
   },state.history.length?0:0);
   return `
 <section class="card hero"><div class="eyebrow">Current workout</div><h1>${nextWorkout()}</h1>
 <p class="muted">${new Date().toLocaleDateString()} · ${state.gym}</p>
 ${last?`<div class="row" style="margin:10px 0 16px">
   <span class="pill">Last: ${last.duration||0} min</span>
   <span class="pill">${daysAgo===0?"Last done today":`Last done ${daysAgo} day${daysAgo===1?"":"s"} ago`}</span>
   <span class="pill">${streak} recent workout${streak===1?"":"s"}</span>
 </div>`:""}
 <button class="btn primary wide" onclick="startWorkout()">Start Workout</button>
 <div class="row" style="margin-top:10px"><button class="btn secondary" onclick="logBodyweight()">Quick Log Bodyweight</button>
 <select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select></div></section>
 <div class="grid"><div class="stat"><span class="muted">Last workout</span><b>${last?.name||"None yet"}</b></div></div>
 <div class="section-title">Choose another workout</div><div class="row">${ROTATION.map(x=>`<button class="btn secondary mini" onclick="startWorkout('${x}')">${x}</button>`).join("")}</div>`;
 }
 const a=state.active;
 const upcoming=a.items.filter(x=>!x.done&&!x.skipped);
 const completed=a.items.filter(x=>x.done||x.skipped);
 return `<section class="card"><div class="row" style="justify-content:space-between"><div>
 <div class="muted">${a.gym} · ${a.busy==="3"?"Packed":a.busy==="1"?"Empty":"Normal"}</div>
 <h1 style="margin:3px 0">${a.name}</h1>
 <label class="muted" style="display:block;margin-top:10px">Workout date</label>
 <input type="date" value="${a.date}" onchange="changeWorkoutDate(this.value)" style="margin-top:5px">
 </div><button class="btn danger mini" onclick="cancelWorkout()">${a.editingIndex!==undefined?"Close":"Cancel"}</button></div></section>
 ${upcoming.map(x=>renderExercise(x)).join("")}
 ${completed.length?`<details class="completed-section"><summary>Completed / skipped (${completed.length})</summary>${completed.map(x=>renderExercise(x,true)).join("")}</details>`:""}
 ${a.editingIndex!==undefined?`<button class="btn primary wide" onclick="saveEditedWorkout()">Save Changes</button>`:`<button class="btn primary wide" onclick="finishWorkout()">Finish Workout</button>`}
 <div id="coreModal" class="card hidden"><h2>Add core?</h2><p class="muted">${state.skippedCore>=2?"You skipped core recently. A 5-minute finisher is enough.":""}</p>
 <div class="core-choice"><button class="btn secondary" onclick="finishWithCore('skip')">Skip</button><button class="btn secondary" onclick="finishWithCore('5')">5 min</button><button class="btn primary" onclick="finishWithCore('10')">10 min</button></div></div>`;
}
function renderExercise(x,collapsed=false){
 const status=x.skipped?"status-skipped":x.done?(x.coach==="INCREASE"||x.coach==="ADD REPS"?"status-increase":"status-repeat"):(x.coach==="REPEAT"?"status-repeat":"status-first");
 const note=state.notes[x.name]||"";
 if(collapsed){
   return `<section class="card collapsed-done ${status}">
     <div class="done-summary">
       <div><div class="done-title">${x.skipped?"Skipped: ":"✓ "}${x.name}</div>${x.originalName?`<div class="subline">Replaced: ${x.originalName}</div>`:""}
       <div class="muted">${x.skipped?"Not completed":`${x.weight} lb · ${x.sets.join(" / ")} reps · Next ${x.next} (${x.coach||"baseline"})`}</div></div>
       <button class="btn secondary mini" onclick="xDoneToggle('${x.id}')">Edit</button>
     </div>
   </section>`;
 }
 return `<section class="card exercise ${status}">
 <div class="order-controls">
   <button class="btn secondary mini" onclick="moveItem('${x.id}',-1)" aria-label="Move up">↑</button>
   <button class="btn secondary mini" onclick="moveItem('${x.id}',1)" aria-label="Move down">↓</button>
 </div>
 <h3>${x.name}</h3>${x.originalName?`<div class="subline">Originally: ${x.originalName}</div>`:""}<div class="meta">${x.coach||"Baseline"}</div>
 <div class="target-row"><div class="stat"><span class="eyebrow">Target weight</span><b class="target-num">${x.weight}</b><span class="muted">lb</span></div><div class="stat"><span class="eyebrow">Target reps</span><b class="target-num">${x.target}</b><span class="muted">per set</span></div></div>
 <div class="entry-grid">
   <label><span class="field-label">Weight</span><span class="weight-wrap"><input type="number" value="${x.weight}" onchange="changeWeight('${x.id}',this.value)" aria-label="Weight"><button type="button" class="btn secondary calc-btn" onclick="openPlateCalculator('${x.id}')" aria-label="Plate calculator"><svg class="calc-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3" width="12" height="18" rx="2"></rect><path d="M9 7h6M9 11h.01M12 11h.01M15 11h.01M9 15h.01M12 15h.01M15 15h.01M9 18h6"></path></svg></button></span></label>
   ${[0,1,2].map(i=>`<label><span class="field-label">S${i+1}</span><input type="number" inputmode="numeric" value="${x.sets[i]??""}" onchange="setVal('${x.id}',${i},this.value)"></label>`).join("")}
 </div>
 <div class="row" style="margin-top:12px">
   <button class="btn secondary mini" onclick="openNotes('${escAttr(x.name)}')">◇ Notes</button>${note?`<div class="note-preview">${note.slice(0,90)}${note.length>90?"…":""}</div>`:""}
 </div>
 <div class="row" style="margin-top:10px">
   ${x.originalName?`<button class="btn secondary mini" onclick="changeExercise('${x.id}')">Change exercise</button>`:""}
   <button class="btn outline-red mini" onclick="swapItem('${x.id}')">Can't do this</button>
   <button class="btn secondary mini" onclick="skipItem('${x.id}')">Skip</button>
   <button class="btn primary mini" style="margin-left:auto" onclick="completeItem('${x.id}')">${x.done?"Finish Exercise":"Complete"}</button>
 </div>
 </section>`;
}
function renderHistory(){return `<div class="section-title">Workout history</div><section class="card">${state.history.length?state.history.map((w,index)=>`<div class="history-item">
 <div class="row" style="justify-content:space-between;align-items:flex-start">
   <div><b>${w.name}</b><div class="muted">${w.date} · ${w.gym} · ${w.duration||0} min</div>
   <div>${w.items.filter(x=>x.done).length} completed · ${w.items.filter(x=>x.skipped).length} skipped · Core ${w.core?.length?"yes":"no"}</div></div>
   <div class="row"><button class="btn secondary mini" onclick="editHistory(${index})">Edit</button>
   <button class="btn danger mini" onclick="deleteHistory(${index})">Delete</button></div>
 </div></div>`).join(""):"No workouts yet."}</section>`}
function renderProgress(){
 const completed=state.history.length, volume=state.history.reduce((sum,w)=>sum+w.items.reduce((s,x)=>s+(x.done?Number(x.weight||0)*x.sets.reduce((a,b)=>a+Number(b||0),0):0),0),0);
 const prs=Object.entries(state.lastWeights).sort((a,b)=>a[0].localeCompare(b[0]));
 const bestFor=(name)=>state.history.flatMap(w=>w.items.filter(x=>x.done&&x.name===name).map(x=>Number(x.weight||0))).reduce((m,x)=>Math.max(m,x),0);
 return `<div class="grid"><div class="stat"><span class="muted">Workouts</span><b>${completed}</b></div><div class="stat"><span class="muted">Total volume</span><b>${Math.round(volume).toLocaleString()}</b></div></div>
 <div class="section-title">Strength progress</div><section class="card">${prs.length?prs.map(([n,v])=>`<div class="history-item"><b>${n}</b>
 <div class="grid" style="margin-top:8px">
   <div class="stat"><span class="muted">Current</span><b>${v.lastWeight}</b></div>
   <div class="stat"><span class="muted">Next</span><b>${v.next}</b></div>
 </div>
 <div class="muted" style="margin-top:8px">Best weight: ${bestFor(n)} · Last sets: ${v.lastSets.join(" / ")}</div></div>`).join(""):"Complete a workout to see progress."}</section>
 <div class="section-title">Bodyweight</div><section class="card">${state.bodyweight.length?state.bodyweight.slice(0,12).map(x=>`<div class="history-item"><b>${x.value}</b><span class="muted"> · ${x.date}</span></div>`).join(""):"No bodyweight entries."}</section>`;
}
function renderSettings(){return `<section class="card"><h2>Gym profile</h2><select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select> <button class="btn secondary mini" onclick="addGym()">Add gym</button></section>
 <section class="card"><h2>Backup</h2><div class="row"><button class="btn secondary" onclick="exportData()">Export JSON</button><label class="btn secondary">Import JSON<input class="hidden" type="file" accept=".json" onchange="importData(event)"></label></div></section>
 <section class="card"><h2>Data</h2><button class="btn danger" onclick="resetData()">Reset everything</button></section>
 <section class="card"><h2>App version</h2><p class="muted">VEKTR 1.0 — offline training tracker</p></section><section class="card"><h2>Install</h2><p class="muted">In Chrome, open the menu and choose <b>Add to Home screen</b> or <b>Install app</b>.</p></section>`}
render();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}
</script>
</body></html>
