n span,.choice-btn span{display:block;margin-top:4px;color:var(--muted);font-size:14px}.recommended,.choice-btn:first-child{border-color:var(--red);box-shadow:inset 0 0 0 1px rgba(179,18,27,.25)}.best-badge{display:inline-block;margin-bottom:8px;color:#F3C2C5;border:1px solid var(--red);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.1em}.weight-wrap{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:6px}.calc-btn{width:42px;height:42px;padding:0}.plate-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.plate-options button{border-radius:999px}.plate-options button.active{background:rgba(179,18,27,.24);border-color:var(--red);color:#fff}.plate-result{background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px}.plate-list{font-size:24px;font-weight:850;margin-top:4px}.note-preview{width:100%;font-size:13px;color:var(--muted);padding-top:2px}.chart{height:90px;width:100%;margin-top:10px}.wordmark{letter-spacing:.3em;text-indent:.3em}.vcheck{font-size:52px;color:var(--red2);text-align:center;line-height:1}.top-actions{display:flex;gap:8px}.progress-line{stroke:var(--red2);fill:none;stroke-width:2}.gridline{stroke:#252529;stroke-width:1}
    .exercise-art{display:block;width:112px;min-width:0}.exercise-art svg{display:block;width:100%;height:auto}.swap-card.no-image{grid-template-columns:1fr}.plate-modal{max-width:360px;padding:14px}.plate-modal .modal-head{justify-content:space-between;margin-bottom:8px}.plate-modal h2{font-size:15px;letter-spacing:.08em}.plate-modal .calc-total{font-size:30px;text-align:left;padding:8px 10px}.bar-options{grid-template-columns:1fr 1fr}.plate-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}.plate-dot{height:54px;border:1px solid var(--line);border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:18px;background:#09090A}.plate-dot.active{border-color:var(--red);color:white;box-shadow:inset 0 0 0 1px rgba(179,18,27,.25)}.plate-result.compact{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center}.plate-result.compact b{display:block;font-size:20px;margin-top:4px}.nearest-grid{grid-template-columns:1fr 1fr}.nearest-btn span{font-size:12px;color:var(--muted)}.plate-actions{grid-template-columns:1fr 1fr;gap:10px}
    .plate-mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#09090A;border:1px solid var(--line);padding:4px;border-radius:14px;margin:10px 0 14px}.plate-mode-tabs button{border:0;border-radius:10px;background:transparent;color:var(--muted);padding:10px 6px;font-size:12px;font-weight:850;letter-spacing:.06em}.plate-mode-tabs button.active{background:rgba(179,18,27,.22);color:#fff}.loaded-plate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:8px}.plate-dot{min-height:58px;height:auto;flex-direction:column;color:var(--muted)}.plate-dot small{font-size:10px;margin-top:2px}.loaded-plate{display:grid;grid-template-columns:1fr 30px;gap:4px;align-items:center}.loaded-plate .plate-dot{width:100%}.plate-minus{width:30px;height:30px;padding:0;border-radius:999px}.plate-clear{display:block;margin:10px auto 0}.plate-modal{max-width:390px;padding:16px}.workout-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.workout-timer{font-variant-numeric:tabular-nums;font-size:20px;letter-spacing:.05em;min-width:86px}.workout-timer.paused{color:var(--amber)}.workout-target{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;margin:5px 88px 4px 0}.workout-target b{color:var(--text)}.manual-next{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center;margin-top:10px}.manual-next>span,.manual-next .field-label,.manual-next .subline{display:block}.stall-note{font-size:12px;color:var(--muted);margin-top:8px}.entry-grid.dynamic-sets{grid-template-columns:minmax(78px,1.15fr) repeat(var(--set-count),minmax(44px,1fr))}
    .progress-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px}.progress-summary .stat{padding:11px}.progress-summary .stat b{font-size:21px}.highlight-row,.exercise-progress-row,.pr-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}.highlight-row:last-child,.exercise-progress-row:last-child,.pr-row:last-child{border-bottom:0}.category{margin:8px 0;background:var(--card);border:1px solid var(--line);border-radius:14px}.category summary{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:14px;list-style:none}.category summary::-webkit-details-marker{display:none}.category-body{padding:0 14px 8px}.status-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex:0 0 auto}.status-dot.increase{background:var(--green)}.status-dot.repeat{background:var(--amber)}.status-dot.reduce{background:var(--reduce)}.status-dot.first{background:var(--blue)}.exercise-progress-row{width:100%;border-width:0 0 1px;background:transparent;color:var(--text);text-align:left}.history-workout{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:9px 0}.history-workout>summary{cursor:pointer;padding:14px;list-style:none}.history-workout>summary::-webkit-details-marker{display:none}.history-detail{padding:0 14px 14px}.history-exercise{padding:9px 0;border-top:1px solid var(--line)}.core-log-row{display:grid;grid-template-columns:28px 1fr 90px;gap:9px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}.core-log-row input[type=checkbox]{width:22px;height:22px}.core-log-row input[type=number]{padding:9px}.progress-chart{width:100%;height:110px;margin:12px 0}.settings-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}.settings-row:last-child{border-bottom:0}
    .category-list{display:grid;gap:8px}.category-row{display:flex;justify-content:space-between;align-items:center;text-align:left}.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px}.filter-row .btn{white-space:nowrap}.search-field{text-align:left!important}.exercise-list{display:grid;gap:9px;overflow:auto;padding-bottom:12px}.exercise-list .swap-card{grid-template-columns:72px 1fr}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.add-exercise-btn{margin:16px 0 8px}.selector-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:520px){.app{padding-left:12px;padding-right:12px}.grid{grid-template-columns:1fr}.swap-card{grid-template-columns:96px 1fr}.exercise-art{width:96px}.entry-grid{grid-template-columns:82px repeat(3,minmax(0,1fr));gap:6px}.entry-grid input{padding:11px 4px;font-size:15px}.hero h1,h1{font-size:29px}.brand{font-size:18px}.target-num{font-size:26px}.btn{padding-left:12px;padding-right:12px}.tab{font-size:11px}}

<body>
<div id="app" class="app"></div>
<div id="toast" class="toast"></div>
<div id="busyModal" class="modal-backdrop hidden" onclick="closeBusyModal()" role="presentation">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="busyModalTitle" onclick="event.stopPropagation()">
    <h2 id="busyModalTitle">How busy is the gym?</h2>
    <p class="muted">Choose a traffic level to set the exercise order.</p>
    <div class="modal-actions">
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('1')"><strong>Empty</strong><span>Use the normal exercise order.</span></button>
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('2')"><strong>Normal</strong><span>Use the normal exercise order.</span></button>
      <button class="btn primary busy-btn recommended" onclick="beginWorkoutWithBusy('3')"><strong>Packed</strong><span>Prioritize easier-to-access stations first.</span></button>
      <button class="btn secondary busy-btn" onclick="closeBusyModal()"><strong>Cancel</strong><span>Go back without starting.</span></button>
    </div>
  </div>
</div>
<div id="swapModal" class="modal-backdrop hidden" onclick="closeSwapModal()" role="presentation"></div>
<div id="plateModal" class="modal-backdrop hidden" onclick="closePlateModal()" role="presentation"></div>
<div id="quickInputModal" class="modal-backdrop hidden" onclick="closeQuickInputModal()" role="presentation"></div>
<div id="notesModal" class="modal-backdrop hidden" onclick="closeNotesModal()" role="presentation"></div>
<div id="timerModal" class="modal-backdrop hidden" onclick="closeTimerModal()" role="presentation"></div>
<div id="progressModal" class="modal-backdrop hidden" onclick="closeProgressModal()" role="presentation"></div>
<div id="addExerciseModal" class="modal-backdrop hidden" onclick="closeAddExerciseModal()" role="presentation"></div>
<script src="js/exercises.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/replacements.js"></script>
<script src="js/plate-calculator.js"></script>
<script src="js/progression.js"></script>
<script src="js/progress.js"></script>
<script src="js/programs.js"></script>
<script src="js/state.js"></script>
<script>
const ROTATION=VEKTR_PROGRAMS.ROTATION;
const PROGRAM=VEKTR_PROGRAMS.LEGACY_PROGRAM;
const MOVEMENT_FAMILIES=VEKTR_EXERCISES.MOVEMENT_FAMILIES;
const META_DEFAULT=VEKTR_EXERCISES.META_DEFAULT;
const EXERCISE_LIBRARY=VEKTR_EXERCISES.EXERCISE_LIBRARY;
const EXERCISE_BY_ID=VEKTR_EXERCISES.EXERCISE_BY_ID;
const EXERCISE_ALIASES=VEKTR_EXERCISES.EXERCISE_ALIASES;
function slugifyExercise(name){return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'generic'}
function libraryByName(name){const id=EXERCISE_ALIASES[String(name||'').toLowerCase()]||slugifyExercise(name);return EXERCISE_BY_ID[id]}
function getMeta(name,subs){const lib=libraryByName(name);return lib?{...lib,substitutions:subs||[]}:{...META_DEFAULT,id:slugifyExercise(name),displayName:name||'Exercise',name:name||'Exercise',substitutions:subs||[]}}
function canonicalExerciseId(name){return getMeta(name).id||slugifyExercise(name)}
function displayExerciseName(name){return getMeta(name).displayName||name}
function isTravelGym(){return /travel|hotel/i.test(state.gym||'')}
function replacementPrefs(){return state.replacementPrefs&&typeof state.replacementPrefs==='object'?state.replacementPrefs:(state.replacementPrefs={})}
function rankedReplacements(x,limit=3){
  const originalName=x.originalName||x.name, base=getMeta(originalName,x.swaps), prefs=replacementPrefs()[base.id]||{};
  return VEKTR_REPLACEMENTS.rankReplacements({baseExerciseId:base.id,explicitIds:(x.swaps||[]).map(canonicalExerciseId),gymMode:isTravelGym()?'Travel':'Home',preferenceCounts:prefs,limit});
}
function legacyCalculatePlateLoad(targetWeight,barWeight,availablePlates=[45,35,25,15,10,5]){
  const target=Number(targetWeight), bar=Number(barWeight||45); if(!Number.isFinite(target)||target<bar)return {exact:false,platesPerSide:[],achievedWeight:bar,lowerOption:null,higherOption:{weight:bar,platesPerSide:[]},invalid:true};
  const plates=[...availablePlates].map(Number).sort((a,b)=>b-a); const maxSide=Math.max(0,Math.ceil((target-bar)/2)+1000); const best=new Map([[0,[]]]);
  const better=(a,b)=>!b||a.length<b.length||(a.length===b.length&&a.join(',')>b.join(','));
  for(let s=1;s<=maxSide;s++){let cand=null; for(const p of plates){const prev=best.get(s-p); if(prev){const arr=[...prev,p].sort((a,b)=>b-a); if(better(arr,cand))cand=arr}} if(cand)best.set(s,cand)}
  const achievable=[...best.keys()].map(side=>({side,weight:bar+2*side,plates:best.get(side)})).sort((a,b)=>a.weight-b.weight);
  const exact=achievable.find(o=>o.weight===target); const lower=[...achievable].reverse().find(o=>o.weight<=target)||null; const higher=achievable.find(o=>o.weight>=target)||null; const chosen=exact||lower||higher;
  return {exact:!!exact,platesPerSide:chosen?.plates||[],achievedWeight:chosen?.weight||bar,lowerOption:lower?{weight:lower.weight,platesPerSide:lower.plates}:null,higherOption:higher?{weight:higher.weight,platesPerSide:higher.plates}:null};
}
function canUsePlateCalculator(x){const m=EXERCISE_BY_ID[x.exerciseId]||getMeta(x.name,x.swaps);return Boolean(m.supportsPlateCalculator)&&m.equipment==='Barbell'&&!/hack|leg press/i.test(m.displayName)}

const CORE={
  "5":[["Cable Crunch",12],["Dead Bug / side",10],["Side Plank / side (sec)",30]],
  "10":[["Hanging Knee Raise",10],["Pallof Press / side",10],["Reverse Crunch",12],["Plank (sec)",45]]
};
const DEFAULT_STATE=VEKTR_STATE.DEFAULT_STATE;
let state=load();
let page="today";
let pendingWorkoutName=null;
let pendingSwapId=null;
let pendingPlateId=null;
let plateBar=45;
let plateMode='target';
let plateTarget='';
let loadedPlateCounts={45:0,35:0,25:0,15:0,10:0,5:0};
let quickInputAction=null;

function cloneDefault(){return VEKTR_STATE.cloneDefault()}
function makeId(){return VEKTR_STATE.createId()}
function normalizeItem(x={},index=0){return VEKTR_STATE.normalizeItem(x,index,{idFactory:makeId})}
function normalizeWorkout(w={},fallbackName){return VEKTR_STATE.normalizeWorkout(w,fallbackName,{idFactory:makeId,today:today()})}
function normalizeState(raw={}){return VEKTR_STATE.normalizeState(raw,{rotation:ROTATION,idFactory:makeId,today:today()})}
function load(){return VEKTR_STATE.loadState(localStorage,{rotation:ROTATION,idFactory:makeId,today:today()})}
function save(){VEKTR_STATE.saveState(localStorage,state)}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1800)}
function today(){return new Date().toISOString().slice(0,10)}
function nextWorkout(){return ROTATION[state.rotationIndex%ROTATION.length]}
function recWeight(name,base,exerciseId=canonicalExerciseId(name)){
  const gymKey=state.gym+"::"+exerciseId;
  const legacyGymKey=state.gym+"::"+name;
  return state.gymWeights[gymKey]?.next ?? state.lastWeights[exerciseId]?.next ?? state.gymWeights[legacyGymKey]?.next ?? state.lastWeights[name]?.next ?? base;
}
function recTarget(name,base,exerciseId=canonicalExerciseId(name)){return state.lastWeights[exerciseId]?.nextTarget??state.lastWeights[name]?.nextTarget??base}
function startWorkout(name=nextWorkout()){
  pendingWorkoutName=name;
  document.getElementById("busyModal").classList.remove("hidden");
}
function closeBusyModal(){
  pendingWorkoutName=null;
  document.getElementById("busyModal").classList.add("hidden");
}
function groupPackedWorkout(items){if(items.length<3)return items;const [lead,...rest]=items,groups=new Map();for(const item of rest){const equipment=(EXERCISE_BY_ID[item.exerciseId]||getMeta(item.name)).equipment||'Other';if(!groups.has(equipment))groups.set(equipment,[]);groups.get(equipment).push(item)}return [lead,...[...groups.values()].flat()].map((item,index)=>({...item,order:index}))}
function beginWorkoutWithBusy(busy){
  const name=pendingWorkoutName||nextWorkout();
  closeBusyModal();

function finishWorkout(){
  const unfinished=state.active.items.filter(x=>!x.done&&!x.skipped).length;
  if(unfinished && !confirm(`${unfinished} exercises unfinished. Finish anyway?`))return;
  document.getElementById("coreModal").classList.remove("hidden");
}
function setVal(id,setIdx,val){const x=state.active.items.find(i=>i.id===id);x.sets[setIdx]=val===""?null:Number(val);save()}
function changeWeight(id,val){const x=state.active.items.find(i=>i.id===id);x.weight=Number(val);save()}
function changeNextWeight(id,val){const x=state.active.items.find(i=>i.id===id);if(!x)return;x.nextOverride=val===''?null:Number(val);if(x.nextOverride!==null)x.next=x.nextOverride;save()}
function changeWorkoutDate(val){
  if(!state.active || !val) return;
  state.active.date=val;
  save();
}
function elapsedWorkoutMs(workout=state.active,at=Date.now()){if(!workout)return 0;const reference=workout.pausedAt||at;return Math.max(0,reference-Number(workout.startedAt||reference)-Number(workout.pausedDurationMs||0))}
function formatElapsed(ms){const total=Math.floor(Math.max(0,ms)/1000),hours=Math.floor(total/3600),minutes=Math.floor((total%3600)/60),seconds=total%60;return hours?`${hours}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`:`${minutes}:${String(seconds).padStart(2,'0')}`}
function updateWorkoutTimer(){const node=document.getElementById('workoutTimer');if(node&&state.active&&state.active.editingIndex===undefined){node.textContent=formatElapsed(elapsedWorkoutMs());node.classList.toggle('paused',Boolean(state.active.pausedAt))}}
function openTimerModal(){if(!state.active||state.active.editingIndex!==undefined)return;const modal=document.getElementById('timerModal'),minutes=Math.round(elapsedWorkoutMs()/60000);modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="timerModalTitle" onclick="event.stopPropagation()"><h2 id="timerModalTitle">Workout Timer</h2><p class="calc-total" style="text-align:left">${formatElapsed(elapsedWorkoutMs())}</p><button class="btn ${state.active.pausedAt?'primary':'secondary'} wide" onclick="toggleWorkoutPause()">${state.active.pausedAt?'Resume':'Pause'}</button><label style="display:block;margin-top:14px"><span class="field-label">ELAPSED MINUTES</span><input id="elapsedMinutesInput" type="number" inputmode="numeric" min="0" value="${minutes}"></label><div class="modal-actions"><button class="btn primary wide" onclick="adjustElapsedMinutes()">Apply Time</button><button class="btn secondary wide" onclick="closeTimerModal()">Close</button></div></div>`;modal.classList.remove('hidden')}
function closeTimerModal(){document.getElementById('timerModal').classList.add('hidden')}
function toggleWorkoutPause(){const w=state.active;if(!w)return;if(w.pausedAt){w.pausedDurationMs=Number(w.pausedDurationMs||0)+(Date.now()-w.pausedAt);w.pausedAt=null}else w.pausedAt=Date.now();save();closeTimerModal();render()}
function adjustElapsedMinutes(){const w=state.active,value=Number(document.getElementById('elapsedMinutesInput')?.value);if(!w||!Number.isFinite(value)||value<0)return toast('Enter valid minutes');const reference=w.pausedAt||Date.now();w.startedAt=reference-Number(w.pausedDurationMs||0)-value*60000;save();closeTimerModal();render()}
function rebuildPerformance(){
  state.lastWeights={};
  state.gymWeights={};
  [...state.history].reverse().forEach(w=>{
    (w.items||[]).forEach(x=>{
      if(x.done){
        const rec={next:x.next,nextTarget:x.nextTarget,coach:x.coach,lastSets:x.sets,lastWeight:x.weight};
        const exerciseId=x.exerciseId||canonicalExerciseId(x.name);
        state.lastWeights[exerciseId]=rec;state.lastWeights[x.name]=rec;
        state.gymWeights[(w.gym||"Unknown")+"::"+exerciseId]=rec;state.gymWeights[(w.gym||"Unknown")+"::"+x.name]=rec;
      }
    });
  });
}
function editHistory(index){
  const original=state.history[index];
  if(!original) return;
  state.active=JSON.parse(JSON.stringify(original));
  state.active.editingIndex=index;
  state.active.items=(state.active.items||[]).map(x=>({
    ...x,
    id:x.id||makeId(),
    sets:Array.isArray(x.sets)?x.sets:[null,null,null],
    target:Number(x.target||0),
    weight:Number(x.weight||0),
    inc:Number(x.inc||0),
    done:Boolean(x.done),
    skipped:Boolean(x.skipped)
  }));
  page="today";
  save();
  render();
}
function saveEditedWorkout(){
  const w=state.active;
  if(!w || w.editingIndex===undefined || w.editingIndex===null) return;
  w.items.forEach(x=>{
    if(x.done && Array.isArray(x.sets) && x.sets.every(v=>v!==null && v!=="")){
      const result=VEKTR_PROGRESSION.evaluateSession({weight:x.weight,sets:x.sets,target:x.target,increment:x.inc,workingSets:x.workingSets,recentSessions:recentExerciseSessions(x.exerciseId||canonicalExerciseId(x.name),w.id),manualNextWeight:x.nextOverride});
      x.next=result.nextWeight;x.nextTarget=result.nextTarget;x.coach=result.coach;x.stalled=result.stalled;
    }
  });
  const index=w.editingIndex;
  delete w.editingIndex;
  state.history[index]=w;
  state.active=null;
  rebuildPerformance();
  save();
  page="history";
  render();
  toast("Workout updated");
}
function deleteHistory(index){
  if(!confirm("Delete this workout permanently?")) return;
  state.history.splice(index,1);
  rebuildPerformance();
  save();
  render();
}
function cancelWorkout(){
  const editing=state.active && state.active.editingIndex!==undefined;
  if(confirm(editing?"Close without saving changes?":"Discard active workout?")){
    state.active=null;save();render();
  }
}
function openQuickInput(title,label,type,action){
  quickInputAction=action;
  const modal=document.getElementById("quickInputModal");
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="quickInputTitle" onclick="event.stopPropagation()">
    <h2 id="quickInputTitle">${title}</h2>
    <label><span class="field-label">${label}</span><input id="quickInputValue" type="${type}" inputmode="${type==="number"?"decimal":"text"}" autofocus></label>
    <div class="modal-actions"><button class="btn primary wide" onclick="submitQuickInput()">Save</button><button class="btn secondary wide" onclick="closeQuickInputModal()">Cancel</button></div>
  </div>`;
  modal.classList.remove("hidden");
  setTimeout(()=>document.getElementById("quickInputValue")?.focus(),0);
}
function closeQuickInputModal(){
  quickInputAction=null;
  document.getElementById("quickInputModal").classList.add("hidden");
}
function submitQuickInput(){
  const v=document.getElementById("quickInputValue")?.value.trim();
  if(!v) return closeQuickInputModal();
  const action=quickInputAction;
  closeQuickInputModal();
  if(action==="bodyweight") state.bodyweight.unshift({date:today(),value:Number(v)});
  if(action==="gym"){state.customGyms.push(v);state.gym=v;}
  save();
  render();
}
function logBodyweight(){openQuickInput("Bodyweight","Weight","number","bodyweight")}
function addGym(){openQuickInput("Add gym","Gym name","text","gym")}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="vektr-backup.json";a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=normalizeState(JSON.parse(r.result));save();render();toast("Backup restored")}catch{toast("Invalid backup")}};r.readAsText(f)}
function resetData(){if(confirm("Delete all VEKTR data?")){localStorage.removeItem("flexppl");state=cloneDefault();render()}}
function navIcon(name){
  const icons={today:"M4 11h16M12 3v18M6 17l6 4 6-4",history:"M4 6h16M6 6v14h12V6M8 11h8M8 15h5",progress:"M4 18l5-5 4 3 7-9M4 21h16",settings:"M12 8a4 4 0 100 8 4 4 0 000-8zM4 12h2m12 0h2M12 4v2m0 12v2"};
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${icons[name]}"></path></svg>`;
}
function render(){document.getElementById("app").innerHTML=`
<header><div class="brand"><img src="icon.svg" alt="VEKTR logo"><span class="wordmark">VEKTR</span></div></header>
${page==="today"?renderToday():page==="history"?renderHistory():page==="progress"?renderProgress():renderSettings()}
<div class="tabs"><div class="inner">
<button class="tab ${page==="today"?"active":""}" onclick="page='today';render()">${navIcon("today")}Today</button>
<button class="tab ${page==="history"?"active":""}" onclick="page='history';render()">${navIcon("history")}History</button>
<button class="tab ${page==="progress"?"active":""}" onclick="page='progress';render()">${navIcon("progress")}Progress</button>
<button class="tab ${page==="settings"?"active":""}" onclick="page='settings';render()">${navIcon("settings")}Settings</button>
</div></div>`}
function renderToday(){
 if(!state.active){
   const last=state.history[0];
   const lastDate=last?new Date(last.date+"T12:00:00"):"";
   const daysAgo=last?Math.max(0,Math.floor((Date.now()-lastDate.getTime())/86400000)):null;
   const streak=state.history.reduce((n,w,i,a)=>{
     if(i===0)return 1;
     const d1=new Date(a[i-1].date+"T12:00:00"),d2=new Date(w.date+"T12:00:00");
     return (d1-d2)<=3*86400000?n+1:n;
   },state.history.length?0:0);
   return `
 <section class="card hero"><div class="eyebrow">Current workout</div><h1>${nextWorkout()}</h1>
 <p class="muted">${new Date().toLocaleDateString()} · ${state.gym}</p>
 ${last?`<div class="row" style="margin:10px 0 16px">
   <span class="pill">Last: ${last.duration||0} min</span>
   <span class="pill">${daysAgo===0?"Last done today":`Last done ${daysAgo} day${daysAgo===1?"":"s"} ago`}</span>
   <span class="pill">${streak} recent workout${streak===1?"":"s"}</span>
 </div>`:""}
 <button class="btn primary wide" onclick="startWorkout()">Start Workout</button>
 <div class="row" style="margin-top:10px"><button class="btn secondary" onclick="logBodyweight()">Quick Log Bodyweight</button>
 <button class="btn secondary" onclick="setGymMode('${state.gym==='Travel'?'Home':'Travel'}')">${state.gym==='Travel'?'✈ Travel':'⌂ Home'}</button></div></section>
 <div class="grid"><div class="stat"><span class="muted">Last workout</span><b>${last?.name||"None yet"}</b></div></div>
 <div class="section-title">Choose another workout</div><div class="row">${ROTATION.map(x=>`<button class="btn secondary mini" onclick="startWorkout('${x}')">${x}</button>`).join("")}</div>`;
 }
 const a=state.active;
 const upcoming=a.items.filter(x=>!x.done&&!x.skipped);
 const completed=a.items.filter(x=>x.done||x.skipped);
 return `<section class="card"><div class="workout-head"><div>
 <div class="muted">${a.gym} · ${a.busy==="3"?"Packed":a.busy==="1"?"Empty":"Normal"}</div>
 <h1 style="margin:3px 0">${a.name}</h1></div><div class="top-actions">${a.editingIndex===undefined?`<button id="workoutTimer" class="btn secondary mini workout-timer ${a.pausedAt?'paused':''}" onclick="openTimerModal()">${formatElapsed(elapsedWorkoutMs(a))}</button>`:''}<button class="btn danger mini" onclick="cancelWorkout()">${a.editingIndex!==undefined?"Close":"Cancel"}</button></div></div>
 <label class="muted" style="display:block;margin-top:10px">Workout date</label>
 <input type="date" value="${a.date}" onchange="changeWorkoutDate(this.value)" style="margin-top:5px"></section>
 ${upcoming.map(x=>renderExercise(x)).join("")}
 ${a.editingIndex===undefined?`<button class="btn secondary wide add-exercise-btn" onclick="openAddExerciseModal()">+ Add Exercise</button>`:''}
 ${completed.length?`<details class="completed-section"><summary>Completed / skipped (${completed.length})</summary>${completed.map(x=>renderExercise(x,true)).join("")}</details>`:""}
 ${a.editingIndex!==undefined?`<button class="btn primary wide" onclick="saveEditedWorkout()">Save Changes</button>`:`<button class="btn primary wide" onclick="finishWorkout()">Finish Workout</button>`}
 <div id="coreModal" class="card hidden"><h2>Add core?</h2><p class="muted">${state.skippedCore>=2?"You skipped core recently. A 5-minute finisher is enough.":""}</p>
 <div class="core-choice"><button class="btn secondary" onclick="finishWithCore('skip')">Skip</button><button class="btn secondary" onclick="finishWithCore('5')">5 min</button><button class="btn primary" onclick="finishWithCore('10')">10 min</button></div></div>`;
}

function chooseProgrammedExercise(id,exerciseId){const x=state.active?.items.find(item=>item.id===id),meta=EXERCISE_BY_ID[exerciseId];if(!x||!meta)return;x.exerciseId=meta.id;x.name=meta.displayName;x.displayNameAtTimeOfWorkout=meta.displayName;x.replacementId=null;x.replacementName=null;x.requiresExerciseChoice=false;x.loadingType=meta.loadingType;x.weight=recWeight(meta.displayName,x.weight,meta.id);x.swaps=[...meta.closestMatchIds,...meta.goodAlternativeIds].map(candidate=>EXERCISE_BY_ID[candidate]?.displayName).filter(Boolean);save();render();toast(`${meta.displayName} selected`)}
function renderExercise(x,collapsed=false){
 const status=x.skipped?"status-skipped":x.coach==="REDUCE"?"status-reduce":x.done?(x.coach==="INCREASE"||x.coach==="ADD REPS"?"status-increase":"status-repeat"):(x.coach==="REPEAT"?"status-repeat":"status-first");
 const note=state.notes[noteKeyForItem(x)]||state.notes[x.name]||"";
 if(collapsed){
   return `<section class="card collapsed-done ${status}">
     <div class="done-summary">
       <div><div class="done-title">${x.skipped?"Skipped: ":"✓ "}${x.name}</div>${x.originalName?`<div class="subline">Replaced: ${x.originalName}</div>`:""}
       <div class="muted">${x.skipped?"Not completed":`${x.weight} lb · ${x.sets.join(" / ")} reps · ${x.coach==='ADD REPS'?`Next ${x.nextTarget} reps`:`Next ${x.next} lb`} (${x.coach||"baseline"})`}</div></div>
       <button class="btn secondary mini" onclick="xDoneToggle('${x.id}')">Edit</button>
     </div>
   </section>`;
 }
 return `<section class="card exercise ${status}">
 <div class="order-controls">
   <button class="btn secondary mini" onclick="moveItem('${x.id}',-1)" aria-label="Move up">↑</button>
   <button class="btn secondary mini" onclick="moveItem('${x.id}',1)" aria-label="Move down">↓</button>
 </div>
 <h3>${x.name}</h3>${x.requiresExerciseChoice?`<div class="selector-actions"><button class="btn primary" onclick="chooseProgrammedExercise('${x.id}','hack-squat')">Hack Squat</button><button class="btn secondary" onclick="chooseProgrammedExercise('${x.id}','leg-press')">Leg Press</button></div>`:''}${x.originalName?`<div class="subline">Originally: ${x.originalName}</div>`:""}<div class="workout-target"><span>Target <b>${x.weight} lb</b></span><span>·</span><span><b>${x.target} reps</b> × ${x.workingSets||x.sets.length} sets</span><span>·</span><span>${x.coach||"Baseline"}</span></div>
 <div class="entry-grid dynamic-sets" style="--set-count:${x.sets.length}">
   <label><span class="field-label">Weight</span><span class="weight-wrap"><input type="number" value="${x.weight}" onchange="changeWeight('${x.id}',this.value)" aria-label="Weight">${canUsePlateCalculator(x)?`<button type="button" class="btn secondary calc-btn" onclick="openPlateCalculator('${x.id}')" aria-label="Plate calculator"><svg class="calc-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3" width="12" height="18" rx="2"></rect><path d="M9 7h6M9 11h.01M12 11h.01M15 11h.01M9 15h.01M12 15h.01M15 15h.01M9 18h6"></path></svg></button>`:''}</span></label>
   ${x.sets.map((_,i)=>`<label><span class="field-label">S${i+1}</span><input type="number" inputmode="numeric" value="${x.sets[i]??""}" onchange="setVal('${x.id}',${i},this.value)"></label>`).join("")}
 </div>
 ${x.coach&&x.inc>0?`<label class="manual-next"><span><span class="field-label">MANUAL NEXT WEIGHT</span><span class="subline">Optional override</span></span><input type="number" value="${x.nextOverride??x.next??x.weight}" onchange="changeNextWeight('${x.id}',this.value)"></label>`:''}${x.stalled?`<div class="stall-note">No progression across three sessions. Consider adjusting load, reps, or exercise setup.</div>`:''}
 <div class="row" style="margin-top:12px">
   <button class="btn secondary mini" onclick="openNotes('${escAttr(noteKeyForItem(x))}')">◇ Notes</button>${note?`<div class="note-preview">${note.slice(0,90)}${note.length>90?"…":""}</div>`:""}
 </div>
 <div class="row" style="margin-top:10px">
   ${x.originalName?`<button class="btn secondary mini" onclick="changeExercise('${x.id}')">Change exercise</button>`:""}
   <button class="btn outline-red mini" onclick="swapItem('${x.id}')">Can't do this</button>
   <button class="btn secondary mini" onclick="skipItem('${x.id}')">Skip</button>${x.addedManually?`<button class="btn danger mini" onclick="removeWorkoutItem('${x.id}')">Remove</button>`:''}
   <button class="btn primary mini" style="margin-left:auto" onclick="completeItem('${x.id}')">${x.done?"Finish Exercise":"Complete"}</button>
 </div>
 </section>`;
}

function setGymMode(mode){state.gym=mode==='Travel'?'Travel':'Home';state.customGyms=['Home','Travel'];save();render()}
function closeProgressModal(){document.getElementById('progressModal').classList.add('hidden')}
function renderTrendChart(sessions){const points=sessions.slice().reverse().map((session,index)=>({x:index,y:Number(session.weight||0)}));if(points.length<2||points.every(point=>point.y===0))return '';const max=Math.max(...points.map(point=>point.y)),min=Math.min(...points.map(point=>point.y)),range=Math.max(1,max-min),coords=points.map((point,index)=>`${12+(index/(points.length-1))*296},${96-((point.y-min)/range)*72}`).join(' ');return `<svg class="progress-chart" viewBox="0 0 320 108" role="img" aria-label="Recent weight trend"><path d="M12 96H308M12 60H308M12 24H308" stroke="#252529" stroke-width="1"/><polyline points="${coords}" fill="none" stroke="#D01822" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function openExerciseProgress(exerciseId){const details=VEKTR_PROGRESS.exerciseDetails(state.history,exerciseId),modal=document.getElementById('progressModal');if(!details)return;modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="progressDetailTitle" onclick="event.stopPropagation()"><div class="modal-head"><button class="icon-btn" onclick="closeProgressModal()" aria-label="Back">←</button><div><div class="section-title">${details.category}</div><h2 id="progressDetailTitle">${details.name}</h2></div></div><div class="progress-summary"><div class="stat"><span class="muted">Latest</span><b>${details.latest.weight||'—'}${details.latest.weight?' lb':''}</b></div><div class="stat"><span class="muted">Next</span><b>${details.latest.coach==='ADD REPS'?`${details.latest.nextTarget} reps`:`${details.latest.next??'—'}${details.latest.next!==undefined?' lb':''}`}</b></div><div class="stat"><span class="muted">Best weight</span><b>${details.bestWeight||'—'}${details.bestWeight?' lb':''}</b></div><div class="stat"><span class="muted">Est. 1RM</span><b>${details.bestOneRepMax||'—'}${details.bestOneRepMax?' lb':''}</b></div></div>${renderTrendChart(details.sessions)}<div class="section-title">RECENT SESSIONS</div>${details.sessions.map(session=>`<div class="history-item"><b>${session.date}</b><div class="muted">${session.weight||0} lb · ${(session.sets||[]).join(' / ')} reps · ${session.coach||'Baseline'}</div></div>`).join('')}<button class="btn secondary wide" style="margin-top:14px" onclick="closeProgressModal()">Close</button></div>`;modal.classList.remove('hidden')}
function openBodyweightHistory(){const modal=document.getElementById('progressModal');modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" onclick="event.stopPropagation()"><div class="modal-head"><button class="icon-btn" onclick="closeProgressModal()" aria-label="Back">←</button><h2>BODYWEIGHT</h2></div>${state.bodyweight.length?state.bodyweight.map(entry=>`<div class="history-item"><b>${entry.value} lb</b><span class="muted"> · ${entry.date}</span></div>`).join(''):'<p class="muted">No entries yet.</p>'}<button class="btn secondary wide" style="margin-top:14px" onclick="closeProgressModal()">Close</button></div>`;modal.classList.remove('hidden')}
function openAllPrs(){const prs=VEKTR_PROGRESS.personalRecords(state.history),modal=document.getElementById('progressModal');modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" onclick="event.stopPropagation()"><div class="modal-head"><button class="icon-btn" onclick="closeProgressModal()" aria-label="Back">←</button><h2>PERSONAL RECORDS</h2></div>${prs.length?prs.map(pr=>`<div class="pr-row"><div><b>${pr.name}</b><div class="muted">${pr.type==='e1rm'?'Estimated 1RM':pr.type==='reps'?'Rep PR':'Weight PR'} · ${pr.date}</div></div><b>${pr.label}</b></div>`).join(''):'<p class="muted">No PRs yet.</p>'}<button class="btn secondary wide" style="margin-top:14px" onclick="closeProgressModal()">Close</button></div>`;modal.classList.remove('hidden')}
function renderProgress(){const progress=VEKTR_PROGRESS.buildProgress(state.history,state.bodyweight),s=progress.summary,bw=progress.bodyweight;return `<div class="section-title">OVERVIEW</div><div class="progress-summary"><div class="stat"><span class="muted">Workouts</span><b>${s.workouts}</b></div><div class="stat"><span class="muted">Total volume</span><b>${s.totalVolume.toLocaleString()}</b></div><div class="stat"><span class="muted">Progressing</span><b>${s.progressing}</b></div><div class="stat"><span class="muted">Recent PRs</span><b>${s.recentPrs}</b></div></div><div class="section-title" style="margin-top:18px">RECENT HIGHLIGHTS</div><section class="card">${progress.highlights.length?progress.highlights.map(item=>`<div class="highlight-row"><span class="status-dot ${item.status}"></span><div style="flex:1"><b>${item.text}</b><div class="muted">${item.date}</div></div></div>`).join(''):'<p class="muted">Complete workouts to build highlights.</p>'}</section><div class="section-title">STRENGTH BY MUSCLE GROUP</div>${progress.groups.length?progress.groups.map(group=>`<details class="category"><summary><div><b>${group.category}</b><div class="muted">${group.exercises.length} exercise${group.exercises.length===1?'':'s'} · ${group.increasing} increasing</div></div><span>›</span></summary><div class="category-body">${group.exercises.map(exercise=>`<button class="exercise-progress-row" onclick="openExerciseProgress('${exercise.exerciseId}')"><span class="status-dot ${exercise.status}"></span><span style="flex:1"><b>${exercise.name}</b><span class="muted" style="display:block">${exercise.latest.weight||0} lb → ${exercise.latest.coach==='ADD REPS'?`${exercise.latest.nextTarget} reps`:`${exercise.latest.next??exercise.latest.weight} lb`}</span></span><span>›</span></button>`).join('')}</div></details>`).join(''):'<section class="card"><p class="muted">Complete a workout to see categorized progress.</p></section>'}<div class="section-title" style="margin-top:18px">BODYWEIGHT</div><section class="card">${bw?`<div class="settings-row"><div><span class="muted">Latest</span><b style="font-size:26px;display:block">${bw.latest} lb</b><span class="muted">${bw.date}${bw.change===null?'':` · ${bw.change>0?'+':''}${bw.change} lb`}</span></div><button class="btn secondary mini" onclick="openBodyweightHistory()">View history</button></div>`:'<div class="settings-row"><span class="muted">No bodyweight entries.</span><button class="btn secondary mini" onclick="logBodyweight()">Log weight</button></div>'}</section><div class="section-title">PERSONAL RECORDS</div><section class="card">${progress.prs.length?progress.prs.slice(0,3).map(pr=>`<div class="pr-row"><div><b>${pr.name}</b><div class="muted">${pr.date}</div></div><b>${pr.label}</b></div>`).join(''):'<p class="muted">No PRs yet.</p>'}${progress.prs.length>3?`<button class="btn secondary wide" style="margin-top:12px" onclick="openAllPrs()">View all PRs</button>`:''}</section>`}
function renderHistory(){return `<div class="section-title">WORKOUT HISTORY</div>${state.history.length?state.history.map((workout,index)=>`<details class="history-workout"><summary><div class="row" style="justify-content:space-between"><div><b>${workout.name}</b><div class="muted">${workout.date} · ${workout.gym} · ${workout.duration||0} min</div></div><span>›</span></div></summary><div class="history-detail">${(workout.items||[]).map(item=>`<div class="history-exercise"><div class="row" style="justify-content:space-between"><b>${item.name}</b><span class="muted">${item.skipped?'Skipped':item.coach||'Baseline'}</span></div>${item.originalName?`<div class="subline">Originally: ${item.originalName}</div>`:''}<div class="muted">${item.skipped?'Not completed':`${item.weight||0} lb · ${(item.sets||[]).join(' / ')} reps`}</div>${state.notes[item.name]?`<div class="subline">${state.notes[item.name]}</div>`:''}</div>`).join('')}${workout.core?.length?`<div class="section-title" style="margin-top:12px">CORE</div>${workout.core.map(core=>`<div class="history-exercise"><b>${core.name}</b><div class="muted">${core.completed?`${core.actual??core.target} completed`:'Skipped'}</div></div>`).join('')}`:''}<div class="row" style="margin-top:12px"><button class="btn secondary mini" onclick="editHistory(${index})">Edit</button><button class="btn danger mini" onclick="deleteHistory(${index})">Delete</button></div></div></details>`).join(''):'<section class="card"><p class="muted">No workouts yet.</p></section>'}`}
function renderSettings(){return `<div class="section-title">TRAINING</div><section class="card"><div class="settings-row"><div><b>Training Program</b><div class="muted">Push / Pull / Legs · 6-workout rotation</div></div><span>Active</span></div><div class="settings-row"><div><b>Gym mode</b><div class="muted">Home assumes full equipment; Travel prioritizes free weights.</div></div><button class="btn secondary mini" onclick="setGymMode('${state.gym==='Travel'?'Home':'Travel'}')">${state.gym}</button></div><div class="settings-row"><div><b>Weight units</b><div class="muted">Pounds</div></div><span>lb</span></div></section><div class="section-title">DATA</div><section class="card"><div class="settings-row"><button class="btn secondary" onclick="exportData()">Export Backup</button><label class="btn secondary">Import Backup<input class="hidden" type="file" accept=".json" onchange="importData(event)"></label></div></section><div class="section-title">APP</div><section class="card"><div class="settings-row"><div><b>Version</b><div class="muted">VEKTR 2.0</div></div></div><div class="settings-row"><button class="btn danger" onclick="resetData()">Reset Data</button></div></section>`}

function startCoreLog(kind){const draft=CORE[kind].map(([name,target])=>({exerciseId:canonicalExerciseId(name),name,target,actual:target,completed:true}));state.active.coreDraft=draft;save();const modal=document.getElementById('coreModal');modal.innerHTML=`<h2>${kind}-minute core</h2><p class="muted">Uncheck anything you skip. Adjust the number only if you want to.</p>${draft.map((entry,index)=>`<label class="core-log-row"><input type="checkbox" checked onchange="setCoreCompleted(${index},this.checked)"><span><b>${entry.name}</b><span class="subline">Target ${entry.target}</span></span><input type="number" value="${entry.actual}" onchange="setCoreActual(${index},this.value)" aria-label="${entry.name} completed"></label>`).join('')}<div class="modal-actions"><button class="btn primary wide" onclick="saveCoreLog()">Save Workout</button><button class="btn secondary wide" onclick="finishWithCore('skip')">Skip Core</button></div>`;modal.classList.remove('hidden')}
function setCoreCompleted(index,value){if(state.active?.coreDraft?.[index])state.active.coreDraft[index].completed=Boolean(value);save()}
function setCoreActual(index,value){if(state.active?.coreDraft?.[index])state.active.coreDraft[index].actual=Number(value);save()}
function finalizeWorkout(coreEntries){const w=state.active;w.endedAt=Date.now();w.durationMs=elapsedWorkoutMs(w);w.durationSeconds=Math.round(w.durationMs/1000);w.duration=Math.round(w.durationMs/60000);w.core=coreEntries;delete w.coreDraft;if(coreEntries.some(entry=>entry.completed))state.skippedCore=0;else state.skippedCore++;w.items.forEach(item=>{if(item.done){const rec={next:item.next,nextTarget:item.nextTarget,coach:item.coach,lastSets:item.sets,lastWeight:item.weight},exerciseId=item.exerciseId||canonicalExerciseId(item.name);state.lastWeights[exerciseId]=rec;state.lastWeights[item.name]=rec;state.gymWeights[w.gym+'::'+exerciseId]=rec;state.gymWeights[w.gym+'::'+item.name]=rec}});state.history.unshift(w);state.active=null;state.rotationIndex=(state.rotationIndex+1)%ROTATION.length;save();render();toast('Workout saved')}
function saveCoreLog(){finalizeWorkout((state.active?.coreDraft||[]).map(entry=>({...entry})))}
function finishWithCore(kind){if(kind==='skip')finalizeWorkout([]);else startCoreLog(kind)}
render();
setInterval(updateWorkoutTimer,1000);
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}
</script>
</body></html>
