<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="description" content="VEKTR training tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>VEKTR</title>
  <style>
    :root{--page:#050505;--elev:#0B0B0C;--card:#111113;--surface:#171719;--line:#2A2A2E;--red:#B3121B;--red2:#D01822;--redDark:#7A0C12;--text:#F3F3F3;--muted:#A3A3AA;--dim:#6F6F77;--green:#5F9F73;--amber:#B9903B;--reduce:#C2474A;--blue:#5E7F9F}
    *{box-sizing:border-box}html{background:var(--page)}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(179,18,27,.16),transparent 34%),linear-gradient(180deg,#050505,#090909 55%,#050505);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;letter-spacing:.01em}button,input,select,textarea{font:inherit}.app{max-width:760px;margin:auto;min-height:100vh;padding:14px 14px calc(104px + env(safe-area-inset-bottom));overflow-x:hidden}
    header{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;margin:0 0 14px;padding:8px 0}.brand{display:flex;justify-content:center;align-items:center;gap:10px;font-weight:850;font-size:22px;letter-spacing:.28em;text-indent:.28em}.brand img{width:30px;height:30px}.icon-btn{height:40px;width:40px;border-radius:12px;background:transparent;border:1px solid var(--line);color:var(--muted)}.pill{background:var(--surface);border:1px solid var(--line);padding:8px 11px;border-radius:999px;color:var(--muted);font-size:13px}.card{background:linear-gradient(180deg,rgba(23,23,25,.78),rgba(17,17,19,.98));border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 18px 38px rgba(0,0,0,.22)}.hero{padding:22px}.eyebrow,.section-title,.field-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.16em}.hero h1,h1{font-size:34px;margin:6px 0 8px;line-height:1}.muted{color:var(--muted)}.dim{color:var(--dim)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:13px 15px;font-weight:780;cursor:pointer;min-height:44px}.primary{background:linear-gradient(135deg,var(--redDark),var(--red2));color:white;border:1px solid #C31520}.secondary{background:var(--surface);color:var(--text);border:1px solid var(--line)}.danger{background:rgba(194,71,74,.13);color:#F0B1B3;border:1px solid rgba(194,71,74,.55)}.outline-red{background:transparent;color:#F1B6B9;border:1px solid var(--red)}.wide{width:100%}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:13px}.stat b{display:block;font-size:24px;line-height:1.1;margin-top:4px}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(11,11,12,.94);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:10;backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}.tabs .inner{width:min(760px,100%);display:grid;grid-template-columns:repeat(4,1fr)}.tab{background:none;border:0;color:var(--dim);padding:11px 5px 10px;font-size:12px}.tab svg{display:block;margin:0 auto 4px;stroke:currentColor}.tab.active{color:var(--red2)}
    .exercise{position:relative}.exercise h3{margin:0 84px 6px 0;font-size:21px}.target-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.target-num{font-size:30px;font-weight:850}.meta{font-size:14px;color:var(--muted)}.order-controls{position:absolute;top:14px;right:14px;display:flex;gap:6px}.order-controls button{width:36px;height:36px;padding:0}.entry-grid{display:grid;grid-template-columns:minmax(88px,1.2fr) repeat(3,minmax(0,1fr));gap:7px;margin-top:14px}.entry-grid label{min-width:0}.entry-grid input,select,input[type=number],input[type=text],textarea{min-width:0;width:100%;background:#09090A;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 7px;text-align:center;font-size:16px}textarea{text-align:left;min-height:120px}.status-first{border-left:3px solid var(--blue)}.status-repeat{border-left:3px solid var(--amber)}.status-increase{border-left:3px solid var(--green)}.status-reduce{border-left:3px solid var(--reduce)}.collapsed-done{padding:12px 14px;background:#0C0D0C}.done-summary{display:flex;justify-content:space-between;align-items:center;gap:12px}.done-title{font-weight:820}.completed-section{margin-top:18px}.completed-section summary{cursor:pointer;color:var(--muted);font-weight:700;padding:10px 2px}.mini{padding:9px 12px;border-radius:12px;min-height:38px}.hidden{display:none!important}.history-item{padding:13px 0;border-bottom:1px solid var(--line)}.history-item:last-child{border-bottom:0}.core-choice{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;background:#101812;color:#D9F0DF;padding:12px 16px;border-radius:12px;border:1px solid rgba(95,159,115,.55);display:none;z-index:40}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.76);display:flex;align-items:center;justify-content:center;padding:18px;z-index:30;backdrop-filter:blur(8px)}.modal{width:min(480px,100%);max-height:calc(100vh - 36px);overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.58)}.modal h2{margin:0 0 8px}.modal-actions{display:grid;gap:12px;margin-top:18px}.busy-btn,.choice-btn{padding:18px 16px;text-align:left}.busy-btn strong,.choice-btn strong{display:block;font-size:21px}.busy-btn span,.choice-btn span{display:block;margin-top:4px;color:var(--muted);font-size:14px}.recommended,.choice-btn:first-child{border-color:var(--red);box-shadow:inset 0 0 0 1px rgba(179,18,27,.25)}.best-badge{display:inline-block;margin-bottom:8px;color:#F3C2C5;border:1px solid var(--red);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.1em}.weight-wrap{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:6px}.calc-btn{width:42px;height:42px;padding:0}.plate-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.plate-options button{border-radius:999px}.plate-options button.active{background:rgba(179,18,27,.24);border-color:var(--red);color:#fff}.plate-result{background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px}.plate-list{font-size:24px;font-weight:850;margin-top:4px}.note-preview{width:100%;font-size:13px;color:var(--muted);padding-top:2px}.chart{height:90px;width:100%;margin-top:10px}.wordmark{letter-spacing:.3em;text-indent:.3em}.vcheck{font-size:52px;color:var(--red2);text-align:center;line-height:1}.top-actions{display:flex;gap:8px}.progress-line{stroke:var(--red2);fill:none;stroke-width:2}.gridline{stroke:#252529;stroke-width:1}
    @media (max-width:520px){.app{padding-left:12px;padding-right:12px}.grid{grid-template-columns:1fr}.entry-grid{grid-template-columns:82px repeat(3,minmax(0,1fr));gap:6px}.entry-grid input{padding:11px 4px;font-size:15px}.hero h1,h1{font-size:29px}.brand{font-size:18px}.target-num{font-size:26px}.btn{padding-left:12px;padding-right:12px}.tab{font-size:11px}}
  </style>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast" class="toast"></div>
<div id="busyModal" class="modal-backdrop hidden" onclick="closeBusyModal()" role="presentation">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="busyModalTitle" onclick="event.stopPropagation()">
    <h2 id="busyModalTitle">How busy is the gym?</h2>
    <p class="muted">Choose a traffic level to set the exercise order.</p>
    <div class="modal-actions">
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('1')"><strong>Empty</strong><span>Use the normal exercise order.</span></button>
      <button class="btn secondary busy-btn" onclick="beginWorkoutWithBusy('2')"><strong>Normal</strong><span>Use the normal exercise order.</span></button>
      <button class="btn primary busy-btn recommended" onclick="beginWorkoutWithBusy('3')"><strong>Packed</strong><span>Prioritize easier-to-access stations first.</span></button>
      <button class="btn secondary busy-btn" onclick="closeBusyModal()"><strong>Cancel</strong><span>Go back without starting.</span></button>
    </div>
  </div>
</div>
<div id="swapModal" class="modal-backdrop hidden" onclick="closeSwapModal()" role="presentation"></div>
<div id="plateModal" class="modal-backdrop hidden" onclick="closePlateModal()" role="presentation"></div>
<div id="quickInputModal" class="modal-backdrop hidden" onclick="closeQuickInputModal()" role="presentation"></div>
<div id="notesModal" class="modal-backdrop hidden" onclick="closeNotesModal()" role="presentation"></div>
<script>
const ROTATION=["Push A","Pull A","Legs A","Push B","Pull B","Legs B"];
const PROGRAM={
"Push A":[
 ["Bench Press",175,6,5,["DB Bench Press","Smith Bench Press","Machine Chest Press","Push-Ups"]],
 ["Incline DB Press",65,12,5,["Incline Smith Press","Incline Machine Press","Low-to-High Cable Press"]],
 ["Machine Shoulder Press",90,10,5,["DB Shoulder Press","Smith Shoulder Press","Landmine Press"]],
 ["Cable Fly (High to Low)",60,12,5,["Pec Deck","DB Fly","Band Fly"]],
 ["Cable Lateral Raise",30,15,5,["DB Lateral Raise","Machine Lateral Raise"]],
 ["Bar Triceps Pushdown",110,12,10,["Rope Pushdown","Single-Arm Pushdown"]],
 ["Skull Crushers",60,10,5,["Overhead Rope Extension","DB Overhead Extension"]]
],
"Pull A":[
 ["Lat Pulldown",110,12,10,["Assisted Pull-Up","Pull-Up","Single-Arm Pulldown"]],
 ["Chest-Supported Row",100,10,10,["Seated Cable Row","Machine Row","One-Arm DB Row"]],
 ["Face Pull",100,15,10,["Rear-Delt Fly","Band Face Pull"]],
 ["Cable Curl",40,12,5,["DB Curl","EZ-Bar Curl"]],
 ["Rope Hammer Curl",90,12,10,["DB Hammer Curl","Cross-Body Hammer Curl"]],
 ["Rear-Delt Fly",50,15,5,["Reverse Pec Deck","Face Pull"]]
],
"Legs A":[
 ["Hack Squat / Leg Press",180,8,10,["Smith Squat","Goblet Squat","Belt Squat"]],
 ["Bulgarian Split Squat",25,10,5,["Walking Lunge","Step-Up","Reverse Lunge"]],
 ["Leg Extension",100,12,10,["Sissy Squat","Spanish Squat"]],
 ["Seated Hamstring Curl",70,10,10,["Lying Ham Curl","Standing Ham Curl"]],
 ["Standing Calf Raise",90,15,10,["Seated Calf Raise","Leg Press Calf Raise"]]
],
"Push B":[
 ["Incline Bench Press",145,10,5,["Incline DB Press","Incline Smith Press","Machine Incline Press"]],
 ["Flat DB Press",70,10,5,["Bench Press","Smith Bench","Machine Chest Press"]],
 ["Cable Fly (Low to High)",50,15,5,["Incline Pec Deck","Low Incline DB Fly"]],
 ["DB / Cable Lateral Raise",30,15,5,["Machine Lateral Raise"]],
 ["Overhead Rope Extension",80,12,10,["Skull Crushers","DB Overhead Extension"]],
 ["Rope Pushdown",110,12,10,["Bar Pushdown","Single-Arm Pushdown"]]
],
"Pull B":[
 ["Pull-Up / Assisted Pull-Up",0,8,0,["Lat Pulldown","Neutral-Grip Pulldown"]],
 ["Seated Cable Row",130,10,10,["Chest-Supported Row","Machine Row"]],
 ["Straight-Arm Pulldown",70,15,10,["Cable Pullover","DB Pullover"]],
 ["Preacher Curl",55,10,5,["Machine Curl","EZ-Bar Curl"]],
 ["Incline DB Curl",30,12,5,["Cable Bayesian Curl","Alternating DB Curl"]],
 ["Face Pull",100,15,10,["Rear-Delt Fly","Reverse Pec Deck"]]
],
"Legs B":[
 ["Smith Squat",135,10,10,["Hack Squat","Leg Press","Goblet Squat"]],
 ["Walking Lunge",25,12,5,["Reverse Lunge","Step-Up","Bulgarian Split Squat"]],
 ["Leg Extension",90,15,10,["Spanish Squat","Sissy Squat"]],
 ["Lying Hamstring Curl",70,12,10,["Seated Ham Curl","Standing Ham Curl"]],
 ["Seated Calf Raise",90,20,10,["Standing Calf Raise","Leg Press Calf Raise"]]
]};
const CORE={
  "5":[["Cable Crunch",12],["Dead Bug / side",10],["Side Plank / side (sec)",30]],
  "10":[["Hanging Knee Raise",10],["Pallof Press / side",10],["Reverse Crunch",12],["Plank (sec)",45]]
};
const DEFAULT_STATE={rotationIndex:0,active:null,history:[],bodyweight:[],gym:"Crunch Gym",customGyms:["Crunch Gym","Travel Gym","Hotel Gym"],notes:{},lastWeights:{},gymWeights:{},skippedCore:0};
let state=load();
let page="today";
let pendingWorkoutName=null;
let pendingSwapId=null;
let pendingPlateId=null;
let plateBar=45;
let quickInputAction=null;

function cloneDefault(){return JSON.parse(JSON.stringify(DEFAULT_STATE))}
function makeId(){
  return (window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():"id-"+Date.now()+"-"+Math.random().toString(36).slice(2);
}
function isTrue(v){return v===true||v===1||v==="true"}
function normalizeItem(x={},index=0){
  const sets=Array.isArray(x.sets)?x.sets.slice(0,3):[null,null,null];
  while(sets.length<3) sets.push(null);
  return {
    ...x,
    id:x.id||makeId(),
    name:x.name||"Exercise",
    weight:Number(x.weight||0),
    target:Number(x.target||0),
    inc:Number(x.inc||0),
    swaps:Array.isArray(x.swaps)?x.swaps:[],
    sets:sets.map(v=>v===""||v===undefined?null:v),
    done:isTrue(x.done),
    skipped:isTrue(x.skipped),
    order:Number.isFinite(Number(x.order))?Number(x.order):index
  };
}
function normalizeWorkout(w={},fallbackName){
  return {
    ...w,
    id:w.id||makeId(),
    name:w.name||fallbackName||"Workout",
    date:w.date||today(),
    startedAt:w.startedAt||Date.now(),
    gym:w.gym||DEFAULT_STATE.gym,
    busy:w.busy||"2",
    items:(Array.isArray(w.items)?w.items:[]).map(normalizeItem),
    core:Array.isArray(w.core)?w.core:(w.core||null)
  };
}
function normalizeState(raw={}){
  const merged={...cloneDefault(),...raw};
  const fallbackName=ROTATION[Number(merged.rotationIndex||0)%ROTATION.length]||ROTATION[0];
  merged.customGyms=Array.isArray(merged.customGyms)&&merged.customGyms.length?merged.customGyms:cloneDefault().customGyms;
  merged.history=Array.isArray(merged.history)?merged.history.map(w=>normalizeWorkout(w,fallbackName)):[];
  merged.bodyweight=Array.isArray(merged.bodyweight)?merged.bodyweight:[];
  merged.notes=merged.notes&&typeof merged.notes==="object"?merged.notes:{};
  merged.lastWeights=merged.lastWeights&&typeof merged.lastWeights==="object"?merged.lastWeights:{};
  merged.gymWeights=merged.gymWeights&&typeof merged.gymWeights==="object"?merged.gymWeights:{};
  merged.active=merged.active?normalizeWorkout(merged.active,fallbackName):null;
  return merged;
}
function load(){try{return normalizeState(JSON.parse(localStorage.getItem("flexppl")||"{}"))}catch{return cloneDefault()}}
function save(){localStorage.setItem("flexppl",JSON.stringify(state))}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1800)}
function today(){return new Date().toISOString().slice(0,10)}
function nextWorkout(){return ROTATION[state.rotationIndex%ROTATION.length]}
function recWeight(name,base){
  const gymKey=state.gym+"::"+name;
  return state.gymWeights[gymKey]?.next ?? state.lastWeights[name]?.next ?? base;
}
function startWorkout(name=nextWorkout()){
  pendingWorkoutName=name;
  document.getElementById("busyModal").classList.remove("hidden");
}
function closeBusyModal(){
  pendingWorkoutName=null;
  document.getElementById("busyModal").classList.add("hidden");
}
function beginWorkoutWithBusy(busy){
  const name=pendingWorkoutName||nextWorkout();
  closeBusyModal();
  let items=PROGRAM[name].map((e,i)=>({id:makeId(),name:e[0],weight:recWeight(e[0],e[1]),target:e[2],inc:e[3],swaps:e[4],sets:[null,null,null],done:false,skipped:false,order:i}));
  if(busy==="3"){
    const priority={"Cable Lateral Raise":1,"DB / Cable Lateral Raise":1,"Face Pull":1,"Cable Curl":1,"Rope Hammer Curl":1,"Rear-Delt Fly":1,
                    "Bar Triceps Pushdown":1,"Rope Pushdown":1,"Overhead Rope Extension":1,"Cable Fly (High to Low)":2,"Cable Fly (Low to High)":2,
                    "Straight-Arm Pulldown":2,"Leg Extension":2,"Seated Hamstring Curl":2,"Lying Hamstring Curl":2};
    items.sort((a,b)=>(priority[a.name]||9)-(priority[b.name]||9));
  }
  state.active={id:makeId(),name,date:today(),startedAt:Date.now(),gym:state.gym,busy,items,core:null}; save(); render();
}
function completeItem(id){
  const x=state.active.items.find(i=>i.id===id); if(!x)return;
  if(x.sets.some(v=>v===null||v==="")) return toast("Enter all 3 sets first");
  x.done=true; const min=Math.min(...x.sets.map(Number)); x.next=(x.inc===0?x.weight:(min>=x.target?Number(x.weight)+x.inc:Number(x.weight)));
  x.coach=min>=x.target?(x.inc===0?"ADD REPS":"INCREASE"):"REPEAT"; save(); render(); toast(x.coach+" next time");
}
function skipItem(id){const x=state.active.items.find(i=>i.id===id);x.skipped=!x.skipped;save();render()}
function xDoneToggle(id){
  const x=state.active.items.find(i=>i.id===id);
  if(!x)return;
  x.done=false;
  x.skipped=false;
  save();
  render();
}
function swapItem(id){
  pendingSwapId=id;
  renderSwapModal();
}
function closeSwapModal(){
  pendingSwapId=null;
  document.getElementById("swapModal").classList.add("hidden");
}
function chooseSwap(name){
  const x=state.active?.items.find(i=>i.id===pendingSwapId);
  if(!x) return closeSwapModal();
  x.originalName=x.originalName||x.name;
  x.name=name;
  x.weight=recWeight(name,x.weight);
  closeSwapModal();
  save();
  render();
  toast("Temporary swap added");
}

function openNotes(name){
  const modal=document.getElementById("notesModal");
  const note=state.notes[name]||"";
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="notesModalTitle" onclick="event.stopPropagation()">
    <h2 id="notesModalTitle">Notes</h2><p class="muted">${name}</p>
    <textarea id="noteText" placeholder="Add setup cues, form notes, or machine settings.">${String(note).replace(/</g,"&lt;")}</textarea>
    <div class="modal-actions"><button class="btn primary wide" onclick="saveNote('${escAttr(name)}')">Save Note</button><button class="btn secondary wide" onclick="closeNotesModal()">Cancel</button></div>
  </div>`;
  modal.classList.remove("hidden");
}
function saveNote(name){const v=document.getElementById("noteText")?.value||""; if(v.trim()) state.notes[name]=v.trim(); else delete state.notes[name]; save(); closeNotesModal(); render();}
function closeNotesModal(){document.getElementById("notesModal").classList.add("hidden")}

function renderSwapModal(){
  const x=state.active?.items.find(i=>i.id===pendingSwapId);
  const modal=document.getElementById("swapModal");
  if(!x){closeSwapModal();return;}
  const choices=(x.swaps||[]).slice(0,3);
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="swapModalTitle" onclick="event.stopPropagation()">
    <h2 id="swapModalTitle">Can't do this?</h2>
    <p class="muted">Pick one replacement for this workout only.</p>
    <div class="modal-actions">${choices.map((name,i)=>`<button class="btn secondary choice-btn" onclick="chooseSwap('${escAttr(name)}')">${i===0?`<span class="best-badge">Best replacement</span>`:""}<strong>${name}</strong><span>${i===0?"Same movement pattern":"Similar stimulus"}</span></button>`).join("")}</div>
    <button class="btn secondary wide" style="margin-top:14px" onclick="closeSwapModal()">Cancel</button>
  </div>`;
  modal.classList.remove("hidden");
}
function openPlateCalculator(id){
  pendingPlateId=id;
  const x=state.active?.items.find(i=>i.id===id);
  plateBar=x?.barWeight||45;
  renderPlateModal();
}
function closePlateModal(){
  pendingPlateId=null;
  document.getElementById("plateModal").classList.add("hidden");
}
function setPlateBar(v){plateBar=Number(v);renderPlateModal()}
function plateBreakdown(total,bar=45){
  let side=(Number(total||0)-bar)/2;
  if(side<0) side=0;
  const plates=[];
  [45,35,25,15,10,5].forEach(p=>{while(side+0.001>=p){plates.push(p);side-=p;}});
  return {plates,extra:side};
}
function achievableAround(total,bar=45){
  const vals=[];
  for(let w=bar;w<=Math.max(Number(total||0)+100,bar);w+=10) vals.push(w);
  let lower=bar,higher=bar;
  vals.forEach(v=>{if(v<=total)lower=v;if(v>=total&&higher<total)higher=v});
  higher=vals.find(v=>v>=total)||lower;
  return {lower,higher};
}
function renderPlateModal(){
  const x=state.active?.items.find(i=>i.id===pendingPlateId);
  const modal=document.getElementById("plateModal");
  if(!x){closePlateModal();return;}
  const weight=Number(x.weight||0);
  const result=plateBreakdown(weight,plateBar);
  const around=achievableAround(weight,plateBar);
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="plateModalTitle" onclick="event.stopPropagation()">
    <h2 id="plateModalTitle">Plate calculator</h2>
    <p class="muted">${x.name}</p>
    <div class="grid"><div class="stat"><span class="eyebrow">Total</span><b>${weight} lb</b></div><div class="stat"><span class="eyebrow">Per side</span><b>${result.plates.length?result.plates.join(" + "):"0"}</b></div></div>
    <div class="field-label" style="margin-top:14px">Bar</div>
    <div class="plate-options">${[45,35].map(v=>`<button class="btn secondary mini ${plateBar===v?"active":""}" onclick="setPlateBar(${v})">${v} lb</button>`).join("")}</div>
    <div class="field-label" style="margin-top:14px">Plate options</div>
    <div class="plate-options">${[45,35,25,15,10,5].map(v=>`<button class="btn secondary mini ${result.plates.includes(v)?"active":""}">${v}</button>`).join("")}</div>
    <div class="plate-result"><div class="eyebrow">Nearest achievable</div><div class="row"><span class="pill">Lower ${around.lower} lb</span><span class="pill">Higher ${around.higher} lb</span></div>${result.extra>0.01?`<div class="muted" style="margin-top:8px">Exact target falls between available plate jumps.</div>`:""}</div>
    <button class="btn primary wide" style="margin-top:14px" onclick="closePlateModal()">Done</button>
  </div>`;
  modal.classList.remove("hidden");
}
function escAttr(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function moveItem(id,dir){const a=state.active.items;const i=a.findIndex(x=>x.id===id);const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}
function finishWorkout(){
  const unfinished=state.active.items.filter(x=>!x.done&&!x.skipped).length;
  if(unfinished && !confirm(`${unfinished} exercises unfinished. Finish anyway?`))return;
  document.getElementById("coreModal").classList.remove("hidden");
}
function finishWithCore(kind){
  const w=state.active; w.endedAt=Date.now(); w.duration=Math.round((w.endedAt-w.startedAt)/60000);
  w.core=kind==="skip"?[]:CORE[kind].map(x=>({name:x[0],target:x[1]}));
  if(kind==="skip")state.skippedCore++;else state.skippedCore=0;
  w.items.forEach(x=>{if(x.done){
    const rec={next:x.next,coach:x.coach,lastSets:x.sets,lastWeight:x.weight};
    state.lastWeights[x.name]=rec;
    state.gymWeights[w.gym+"::"+x.name]=rec;
  }});
  state.history.unshift(w); state.active=null; state.rotationIndex=(state.rotationIndex+1)%ROTATION.length; save(); render(); toast("Workout saved");
}
function setVal(id,setIdx,val){const x=state.active.items.find(i=>i.id===id);x.sets[setIdx]=val===""?null:Number(val);save()}
function changeWeight(id,val){const x=state.active.items.find(i=>i.id===id);x.weight=Number(val);save()}
function changeWorkoutDate(val){
  if(!state.active || !val) return;
  state.active.date=val;
  save();
}
function rebuildPerformance(){
  state.lastWeights={};
  state.gymWeights={};
  [...state.history].reverse().forEach(w=>{
    (w.items||[]).forEach(x=>{
      if(x.done){
        const rec={next:x.next,coach:x.coach,lastSets:x.sets,lastWeight:x.weight};
        state.lastWeights[x.name]=rec;
        state.gymWeights[(w.gym||"Unknown")+"::"+x.name]=rec;
      }
    });
  });
}
function editHistory(index){
  const original=state.history[index];
  if(!original) return;
  state.active=JSON.parse(JSON.stringify(original));
  state.active.editingIndex=index;
  state.active.items=(state.active.items||[]).map(x=>({
    ...x,
    id:x.id||makeId(),
    sets:Array.isArray(x.sets)?x.sets:[null,null,null],
    target:Number(x.target||0),
    weight:Number(x.weight||0),
    inc:Number(x.inc||0),
    done:Boolean(x.done),
    skipped:Boolean(x.skipped)
  }));
  page="today";
  save();
  render();
}
function saveEditedWorkout(){
  const w=state.active;
  if(!w || w.editingIndex===undefined || w.editingIndex===null) return;
  w.items.forEach(x=>{
    if(x.done && Array.isArray(x.sets) && x.sets.every(v=>v!==null && v!=="")){
      const min=Math.min(...x.sets.map(Number));
      x.next=x.inc===0?x.weight:(min>=x.target?Number(x.weight)+Number(x.inc):Number(x.weight));
      x.coach=min>=x.target?(x.inc===0?"ADD REPS":"INCREASE"):"REPEAT";
    }
  });
  const index=w.editingIndex;
  delete w.editingIndex;
  state.history[index]=w;
  state.active=null;
  rebuildPerformance();
  save();
  page="history";
  render();
  toast("Workout updated");
}
function deleteHistory(index){
  if(!confirm("Delete this workout permanently?")) return;
  state.history.splice(index,1);
  rebuildPerformance();
  save();
  render();
}
function cancelWorkout(){
  const editing=state.active && state.active.editingIndex!==undefined;
  if(confirm(editing?"Close without saving changes?":"Discard active workout?")){
    state.active=null;save();render();
  }
}
function openQuickInput(title,label,type,action){
  quickInputAction=action;
  const modal=document.getElementById("quickInputModal");
  modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="quickInputTitle" onclick="event.stopPropagation()">
    <h2 id="quickInputTitle">${title}</h2>
    <label><span class="field-label">${label}</span><input id="quickInputValue" type="${type}" inputmode="${type==="number"?"decimal":"text"}" autofocus></label>
    <div class="modal-actions"><button class="btn primary wide" onclick="submitQuickInput()">Save</button><button class="btn secondary wide" onclick="closeQuickInputModal()">Cancel</button></div>
  </div>`;
  modal.classList.remove("hidden");
  setTimeout(()=>document.getElementById("quickInputValue")?.focus(),0);
}
function closeQuickInputModal(){
  quickInputAction=null;
  document.getElementById("quickInputModal").classList.add("hidden");
}
function submitQuickInput(){
  const v=document.getElementById("quickInputValue")?.value.trim();
  if(!v) return closeQuickInputModal();
  const action=quickInputAction;
  closeQuickInputModal();
  if(action==="bodyweight") state.bodyweight.unshift({date:today(),value:Number(v)});
  if(action==="gym"){state.customGyms.push(v);state.gym=v;}
  save();
  render();
}
function logBodyweight(){openQuickInput("Bodyweight","Weight","number","bodyweight")}
function addGym(){openQuickInput("Add gym","Gym name","text","gym")}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="vektr-backup.json";a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=normalizeState(JSON.parse(r.result));save();render();toast("Backup restored")}catch{toast("Invalid backup")}};r.readAsText(f)}
function resetData(){if(confirm("Delete all VEKTR data?")){localStorage.removeItem("flexppl");state=cloneDefault();render()}}
function navIcon(name){
  const icons={today:"M4 11h16M12 3v18M6 17l6 4 6-4",history:"M4 6h16M6 6v14h12V6M8 11h8M8 15h5",progress:"M4 18l5-5 4 3 7-9M4 21h16",settings:"M12 8a4 4 0 100 8 4 4 0 000-8zM4 12h2m12 0h2M12 4v2m0 12v2"};
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${icons[name]}"></path></svg>`;
}
function render(){document.getElementById("app").innerHTML=`
<header><button class="icon-btn" aria-label="Menu">☰</button><div class="brand"><img src="icon.svg" alt=""><span class="wordmark">VEKTR</span></div><button class="icon-btn" aria-label="Back" onclick="if(page!=='today'){page='today';render()}">‹</button></header>
${page==="today"?renderToday():page==="history"?renderHistory():page==="progress"?renderProgress():renderSettings()}
<div class="tabs"><div class="inner">
<button class="tab ${page==="today"?"active":""}" onclick="page='today';render()">${navIcon("today")}Today</button>
<button class="tab ${page==="history"?"active":""}" onclick="page='history';render()">${navIcon("history")}History</button>
<button class="tab ${page==="progress"?"active":""}" onclick="page='progress';render()">${navIcon("progress")}Progress</button>
<button class="tab ${page==="settings"?"active":""}" onclick="page='settings';render()">${navIcon("settings")}Settings</button>
</div></div>`}
function renderToday(){
 if(!state.active){
   const last=state.history[0];
   const lastDate=last?new Date(last.date+"T12:00:00"):"";
   const daysAgo=last?Math.max(0,Math.floor((Date.now()-lastDate.getTime())/86400000)):null;
   const streak=state.history.reduce((n,w,i,a)=>{
     if(i===0)return 1;
     const d1=new Date(a[i-1].date+"T12:00:00"),d2=new Date(w.date+"T12:00:00");
     return (d1-d2)<=3*86400000?n+1:n;
   },state.history.length?0:0);
   return `
 <section class="card hero"><div class="eyebrow">Current workout</div><h1>${nextWorkout()}</h1>
 <p class="muted">${new Date().toLocaleDateString()} · ${state.gym}</p>
 ${last?`<div class="row" style="margin:10px 0 16px">
   <span class="pill">Last: ${last.duration||0} min</span>
   <span class="pill">${daysAgo===0?"Last done today":`Last done ${daysAgo} day${daysAgo===1?"":"s"} ago`}</span>
   <span class="pill">${streak} recent workout${streak===1?"":"s"}</span>
 </div>`:""}
 <button class="btn primary wide" onclick="startWorkout()">Start Workout</button>
 <div class="row" style="margin-top:10px"><button class="btn secondary" onclick="logBodyweight()">Quick Log Bodyweight</button>
 <select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select></div></section>
 <div class="grid"><div class="stat"><span class="muted">Last workout</span><b>${last?.name||"None yet"}</b></div><div class="stat"><span class="muted">Bodyweight</span><b>${state.bodyweight[0]?.value||"—"}</b></div></div>
 <div class="section-title">Choose another workout</div><div class="row">${ROTATION.map(x=>`<button class="btn secondary mini" onclick="startWorkout('${x}')">${x}</button>`).join("")}</div>`;
 }
 const a=state.active;
 const upcoming=a.items.filter(x=>!x.done&&!x.skipped);
 const completed=a.items.filter(x=>x.done||x.skipped);
 return `<section class="card"><div class="row" style="justify-content:space-between"><div>
 <div class="muted">${a.gym} · ${a.busy==="3"?"Packed":a.busy==="1"?"Empty":"Normal"}</div>
 <h1 style="margin:3px 0">${a.name}</h1>
 <label class="muted" style="display:block;margin-top:10px">Workout date</label>
 <input type="date" value="${a.date}" onchange="changeWorkoutDate(this.value)" style="margin-top:5px">
 </div><button class="btn danger mini" onclick="cancelWorkout()">${a.editingIndex!==undefined?"Close":"Cancel"}</button></div></section>
 ${upcoming.map(x=>renderExercise(x)).join("")}
 ${completed.length?`<details class="completed-section"><summary>Completed / skipped (${completed.length})</summary>${completed.map(x=>renderExercise(x,true)).join("")}</details>`:""}
 ${a.editingIndex!==undefined?`<button class="btn primary wide" onclick="saveEditedWorkout()">Save Changes</button>`:`<button class="btn primary wide" onclick="finishWorkout()">Finish Workout</button>`}
 <div id="coreModal" class="card hidden"><h2>Add core?</h2><p class="muted">${state.skippedCore>=2?"You skipped core recently. A 5-minute finisher is enough.":""}</p>
 <div class="core-choice"><button class="btn secondary" onclick="finishWithCore('skip')">Skip</button><button class="btn secondary" onclick="finishWithCore('5')">5 min</button><button class="btn primary" onclick="finishWithCore('10')">10 min</button></div></div>`;
}
function renderExercise(x,collapsed=false){
 const status=x.skipped?"status-reduce":x.done?(x.coach==="INCREASE"||x.coach==="ADD REPS"?"status-increase":"status-repeat"):(x.coach==="REPEAT"?"status-repeat":"status-first");
 const note=state.notes[x.name]||"";
 if(collapsed){
   return `<section class="card collapsed-done ${status}">
     <div class="done-summary">
       <div><div class="done-title">${x.skipped?"Skipped: ":"✓ "}${x.name}</div>
       <div class="muted">${x.skipped?"Not completed":`${x.weight} lb · ${x.sets.join(" / ")} reps · Next ${x.next} (${x.coach||"baseline"})`}</div></div>
       <button class="btn secondary mini" onclick="xDoneToggle('${x.id}')">Edit</button>
     </div>
   </section>`;
 }
 return `<section class="card exercise ${status}">
 <div class="order-controls">
   <button class="btn secondary mini" onclick="moveItem('${x.id}',-1)" aria-label="Move up">↑</button>
   <button class="btn secondary mini" onclick="moveItem('${x.id}',1)" aria-label="Move down">↓</button>
 </div>
 <h3>${x.name}</h3><div class="meta">${x.coach||"Baseline"}</div>
 <div class="target-row"><div class="stat"><span class="eyebrow">Target weight</span><b class="target-num">${x.weight}</b><span class="muted">lb</span></div><div class="stat"><span class="eyebrow">Target reps</span><b class="target-num">${x.target}</b><span class="muted">per set</span></div></div>
 <div class="entry-grid">
   <label><span class="field-label">Weight</span><span class="weight-wrap"><input type="number" value="${x.weight}" onchange="changeWeight('${x.id}',this.value)" aria-label="Weight"><button type="button" class="btn secondary calc-btn" onclick="openPlateCalculator('${x.id}')" aria-label="Plate calculator">⌁</button></span></label>
   ${[0,1,2].map(i=>`<label><span class="field-label">S${i+1}</span><input type="number" inputmode="numeric" value="${x.sets[i]??""}" onchange="setVal('${x.id}',${i},this.value)"></label>`).join("")}
 </div>
 <div class="row" style="margin-top:12px">
   <button class="btn secondary mini" onclick="openNotes('${escAttr(x.name)}')">◇ Notes</button>${note?`<div class="note-preview">${note.slice(0,90)}${note.length>90?"…":""}</div>`:""}
 </div>
 <div class="row" style="margin-top:10px">
   <button class="btn outline-red mini" onclick="swapItem('${x.id}')">Can't do this</button>
   <button class="btn secondary mini" onclick="skipItem('${x.id}')">Skip</button>
   <button class="btn primary mini" style="margin-left:auto" onclick="completeItem('${x.id}')">${x.done?"Finish Exercise":"Complete"}</button>
 </div>
 </section>`;
}
function renderHistory(){return `<div class="section-title">Workout history</div><section class="card">${state.history.length?state.history.map((w,index)=>`<div class="history-item">
 <div class="row" style="justify-content:space-between;align-items:flex-start">
   <div><b>${w.name}</b><div class="muted">${w.date} · ${w.gym} · ${w.duration||0} min</div>
   <div>${w.items.filter(x=>x.done).length} completed · ${w.items.filter(x=>x.skipped).length} skipped · Core ${w.core?.length?"yes":"no"}</div></div>
   <div class="row"><button class="btn secondary mini" onclick="editHistory(${index})">Edit</button>
   <button class="btn danger mini" onclick="deleteHistory(${index})">Delete</button></div>
 </div></div>`).join(""):"No workouts yet."}</section>`}
function renderProgress(){
 const completed=state.history.length, volume=state.history.reduce((sum,w)=>sum+w.items.reduce((s,x)=>s+(x.done?Number(x.weight||0)*x.sets.reduce((a,b)=>a+Number(b||0),0):0),0),0);
 const prs=Object.entries(state.lastWeights).sort((a,b)=>a[0].localeCompare(b[0]));
 const bestFor=(name)=>state.history.flatMap(w=>w.items.filter(x=>x.done&&x.name===name).map(x=>Number(x.weight||0))).reduce((m,x)=>Math.max(m,x),0);
 return `<div class="grid"><div class="stat"><span class="muted">Workouts</span><b>${completed}</b></div><div class="stat"><span class="muted">Total volume</span><b>${Math.round(volume).toLocaleString()}</b></div></div>
 <div class="section-title">Strength progress</div><section class="card">${prs.length?prs.map(([n,v])=>`<div class="history-item"><b>${n}</b>
 <div class="grid" style="margin-top:8px">
   <div class="stat"><span class="muted">Current</span><b>${v.lastWeight}</b></div>
   <div class="stat"><span class="muted">Next</span><b>${v.next}</b></div>
 </div>
 <div class="muted" style="margin-top:8px">Best weight: ${bestFor(n)} · Last sets: ${v.lastSets.join(" / ")}</div></div>`).join(""):"Complete a workout to see progress."}</section>
 <div class="section-title">Bodyweight</div><section class="card">${state.bodyweight.length?state.bodyweight.slice(0,12).map(x=>`<div class="history-item"><b>${x.value}</b><span class="muted"> · ${x.date}</span></div>`).join(""):"No bodyweight entries."}</section>`;
}
function renderSettings(){return `<section class="card"><h2>Gym profile</h2><select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select> <button class="btn secondary mini" onclick="addGym()">Add gym</button></section>
 <section class="card"><h2>Backup</h2><div class="row"><button class="btn secondary" onclick="exportData()">Export JSON</button><label class="btn secondary">Import JSON<input class="hidden" type="file" accept=".json" onchange="importData(event)"></label></div></section>
 <section class="card"><h2>Data</h2><button class="btn danger" onclick="resetData()">Reset everything</button></section>
 <section class="card"><h2>App version</h2><p class="muted">VEKTR 1.0 — offline training tracker</p></section><section class="card"><h2>Install</h2><p class="muted">In Chrome, open the menu and choose <b>Add to Home screen</b> or <b>Install app</b>.</p></section>`}
render();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}
</script>
</body></html>
