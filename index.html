<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Flexible PPL workout tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>FlexPPL</title>
  <style>
    :root{--bg:#0b1220;--card:#111827;--muted:#94a3b8;--text:#f8fafc;--accent:#22c55e;--accent2:#38bdf8;--danger:#ef4444;--line:#263244;--warn:#f59e0b}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#07101d,#0b1220 35%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    button,input,select{font:inherit}.app{max-width:760px;margin:auto;min-height:100vh;padding:16px 16px 88px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.brand{font-weight:800;font-size:24px}.pill{background:#152033;border:1px solid var(--line);padding:8px 12px;border-radius:999px;color:var(--muted)}
    .card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    .hero{padding:20px}.hero h1{font-size:34px;margin:0 0 6px}.muted{color:var(--muted)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{border:0;border-radius:14px;padding:14px 16px;font-weight:750;cursor:pointer}.primary{background:var(--accent);color:#052e16}.secondary{background:#172033;color:var(--text);border:1px solid var(--line)}.danger{background:#33161b;color:#fecaca;border:1px solid #7f1d1d}
    .wide{width:100%}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#0d1727;border:1px solid var(--line);border-radius:14px;padding:12px}
    .stat b{display:block;font-size:21px}.tabs{position:fixed;left:0;right:0;bottom:0;background:#0a111d;border-top:1px solid var(--line);display:flex;justify-content:center;z-index:10}
    .tabs .inner{width:min(760px,100%);display:grid;grid-template-columns:repeat(4,1fr)}.tab{background:none;border:0;color:var(--muted);padding:13px 5px}.tab.active{color:var(--accent)}
    .exercise{display:block;position:relative}.exercise.done{opacity:1}.exercise h3{margin:0 0 6px;padding-right:92px}.meta{font-size:14px;color:var(--muted)}
    .exercise-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .order-controls{position:absolute;top:14px;right:14px;display:flex;gap:6px}
    .order-controls button{width:38px;height:38px;padding:0;border-radius:10px}
    .field-label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
    .entry-grid{display:grid;grid-template-columns:88px repeat(3,minmax(0,1fr));gap:7px;margin-top:14px}
    .entry-grid label{min-width:0}
    .entry-grid input{min-width:0;width:100%;background:#0a1321;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center;font-size:16px}
    .status-first{border-left:4px solid var(--accent2)}
    .status-repeat{border-left:4px solid var(--warn)}
    .status-increase{border-left:4px solid var(--accent)}
    .collapsed-done{padding:13px 15px;background:#0d1b16;border-color:#166534}
    .collapsed-done .done-summary{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .collapsed-done .done-title{font-weight:800}
    .completed-section{margin-top:18px}
    .completed-section summary{cursor:pointer;color:var(--muted);font-weight:700;padding:10px 2px}
    .setline{display:grid;grid-template-columns:76px repeat(3,minmax(0,1fr));gap:7px;margin-top:12px}.setline input{min-width:0;width:100%;background:#0a1321;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center;font-size:16px}
    select,input[type=number],input[type=text]{background:#0a1321;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px}
    .mini{padding:9px 12px;border-radius:12px}.complete{background:#10351f;color:#bbf7d0;border:1px solid #166534}.swap{background:#102639;color:#bae6fd;border:1px solid #075985}
    .hidden{display:none!important}.section-title{margin:22px 2px 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
    .history-item{padding:12px 0;border-bottom:1px solid var(--line)} .history-item:last-child{border-bottom:0}
    .core-choice{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;background:#052e16;color:#dcfce7;padding:12px 16px;border-radius:12px;border:1px solid #166534;display:none}
    .drag{color:var(--muted);font-size:22px;cursor:grab}.top-actions{display:flex;gap:8px}.top-actions button{padding:8px 10px}
    @media (max-width:520px){.grid{grid-template-columns:1fr}.entry-grid{grid-template-columns:76px repeat(3,minmax(0,1fr));gap:6px}.entry-grid input{padding:11px 4px;font-size:15px}.hero h1{font-size:28px}}
  </style>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast" class="toast"></div>
<script>
const ROTATION=["Push A","Pull A","Legs A","Push B","Pull B","Legs B"];
const PROGRAM={
"Push A":[
 ["Bench Press",175,6,5,["DB Bench Press","Smith Bench Press","Machine Chest Press","Push-Ups"]],
 ["Incline DB Press",65,12,5,["Incline Smith Press","Incline Machine Press","Low-to-High Cable Press"]],
 ["Machine Shoulder Press",90,10,5,["DB Shoulder Press","Smith Shoulder Press","Landmine Press"]],
 ["Cable Fly (High to Low)",60,12,5,["Pec Deck","DB Fly","Band Fly"]],
 ["Cable Lateral Raise",30,15,5,["DB Lateral Raise","Machine Lateral Raise"]],
 ["Bar Triceps Pushdown",110,12,10,["Rope Pushdown","Single-Arm Pushdown"]],
 ["Skull Crushers",60,10,5,["Overhead Rope Extension","DB Overhead Extension"]]
],
"Pull A":[
 ["Lat Pulldown",110,12,10,["Assisted Pull-Up","Pull-Up","Single-Arm Pulldown"]],
 ["Chest-Supported Row",100,10,10,["Seated Cable Row","Machine Row","One-Arm DB Row"]],
 ["Face Pull",100,15,10,["Rear-Delt Fly","Band Face Pull"]],
 ["Cable Curl",40,12,5,["DB Curl","EZ-Bar Curl"]],
 ["Rope Hammer Curl",90,12,10,["DB Hammer Curl","Cross-Body Hammer Curl"]],
 ["Rear-Delt Fly",50,15,5,["Reverse Pec Deck","Face Pull"]]
],
"Legs A":[
 ["Hack Squat / Leg Press",180,8,10,["Smith Squat","Goblet Squat","Belt Squat"]],
 ["Bulgarian Split Squat",25,10,5,["Walking Lunge","Step-Up","Reverse Lunge"]],
 ["Leg Extension",100,12,10,["Sissy Squat","Spanish Squat"]],
 ["Seated Hamstring Curl",70,10,10,["Lying Ham Curl","Standing Ham Curl"]],
 ["Standing Calf Raise",90,15,10,["Seated Calf Raise","Leg Press Calf Raise"]]
],
"Push B":[
 ["Incline Bench Press",145,10,5,["Incline DB Press","Incline Smith Press","Machine Incline Press"]],
 ["Flat DB Press",70,10,5,["Bench Press","Smith Bench","Machine Chest Press"]],
 ["Cable Fly (Low to High)",50,15,5,["Incline Pec Deck","Low Incline DB Fly"]],
 ["DB / Cable Lateral Raise",30,15,5,["Machine Lateral Raise"]],
 ["Overhead Rope Extension",80,12,10,["Skull Crushers","DB Overhead Extension"]],
 ["Rope Pushdown",110,12,10,["Bar Pushdown","Single-Arm Pushdown"]]
],
"Pull B":[
 ["Pull-Up / Assisted Pull-Up",0,8,0,["Lat Pulldown","Neutral-Grip Pulldown"]],
 ["Seated Cable Row",130,10,10,["Chest-Supported Row","Machine Row"]],
 ["Straight-Arm Pulldown",70,15,10,["Cable Pullover","DB Pullover"]],
 ["Preacher Curl",55,10,5,["Machine Curl","EZ-Bar Curl"]],
 ["Incline DB Curl",30,12,5,["Cable Bayesian Curl","Alternating DB Curl"]],
 ["Face Pull",100,15,10,["Rear-Delt Fly","Reverse Pec Deck"]]
],
"Legs B":[
 ["Smith Squat",135,10,10,["Hack Squat","Leg Press","Goblet Squat"]],
 ["Walking Lunge",25,12,5,["Reverse Lunge","Step-Up","Bulgarian Split Squat"]],
 ["Leg Extension",90,15,10,["Spanish Squat","Sissy Squat"]],
 ["Lying Hamstring Curl",70,12,10,["Seated Ham Curl","Standing Ham Curl"]],
 ["Seated Calf Raise",90,20,10,["Standing Calf Raise","Leg Press Calf Raise"]]
]};
const CORE={
  "5":[["Cable Crunch",12],["Dead Bug / side",10],["Side Plank / side (sec)",30]],
  "10":[["Hanging Knee Raise",10],["Pallof Press / side",10],["Reverse Crunch",12],["Plank (sec)",45]]
};
const DEFAULT_STATE={rotationIndex:0,active:null,history:[],bodyweight:[],gym:"Crunch Gym",customGyms:["Crunch Gym","Travel Gym","Hotel Gym"],notes:{},lastWeights:{},gymWeights:{},skippedCore:0};
let state=load();
let page="today";

function load(){try{return {...DEFAULT_STATE,...JSON.parse(localStorage.getItem("flexppl")||"{}")}}catch{return structuredClone(DEFAULT_STATE)}}
function save(){localStorage.setItem("flexppl",JSON.stringify(state))}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1800)}
function today(){return new Date().toISOString().slice(0,10)}
function nextWorkout(){return ROTATION[state.rotationIndex%ROTATION.length]}
function recWeight(name,base){
  const gymKey=state.gym+"::"+name;
  return state.gymWeights[gymKey]?.next ?? state.lastWeights[name]?.next ?? base;
}
function startWorkout(name=nextWorkout()){
  const busy=(prompt("How busy is the gym?
1. Empty
2. Normal
3. Packed","2")||"2");
  let items=PROGRAM[name].map((e,i)=>({id:crypto.randomUUID(),name:e[0],weight:recWeight(e[0],e[1]),target:e[2],inc:e[3],swaps:e[4],sets:[null,null,null],done:false,skipped:false,order:i}));
  if(busy==="3"){
    const priority={"Cable Lateral Raise":1,"DB / Cable Lateral Raise":1,"Face Pull":1,"Cable Curl":1,"Rope Hammer Curl":1,"Rear-Delt Fly":1,
                    "Bar Triceps Pushdown":1,"Rope Pushdown":1,"Overhead Rope Extension":1,"Cable Fly (High to Low)":2,"Cable Fly (Low to High)":2,
                    "Straight-Arm Pulldown":2,"Leg Extension":2,"Seated Hamstring Curl":2,"Lying Hamstring Curl":2};
    items.sort((a,b)=>(priority[a.name]||9)-(priority[b.name]||9));
  }
  state.active={id:crypto.randomUUID(),name,date:today(),startedAt:Date.now(),gym:state.gym,busy,items,core:null}; save(); render();
}
function completeItem(id){
  const x=state.active.items.find(i=>i.id===id); if(!x)return;
  if(x.sets.some(v=>v===null||v==="")) return toast("Enter all 3 sets first");
  x.done=true; const min=Math.min(...x.sets.map(Number)); x.next=(x.inc===0?x.weight:(min>=x.target?Number(x.weight)+x.inc:Number(x.weight)));
  x.coach=min>=x.target?(x.inc===0?"ADD REPS":"INCREASE"):"REPEAT"; save(); render(); toast(x.coach+" next time");
}
function skipItem(id){const x=state.active.items.find(i=>i.id===id);x.skipped=!x.skipped;save();render()}
function xDoneToggle(id){
  const x=state.active.items.find(i=>i.id===id);
  if(!x)return;
  x.done=false;
  x.skipped=false;
  save();
  render();
}
function swapItem(id){
  const x=state.active.items.find(i=>i.id===id); const choice=prompt("Swap with:\\n"+x.swaps.map((s,i)=>`${i+1}. ${s}`).join("\\n"));
  const n=Number(choice)-1;if(n>=0&&n<x.swaps.length){x.name=x.swaps[n];x.weight=recWeight(x.name,x.weight);save();render()}
}
function moveItem(id,dir){const a=state.active.items;const i=a.findIndex(x=>x.id===id);const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}
function finishWorkout(){
  const unfinished=state.active.items.filter(x=>!x.done&&!x.skipped).length;
  if(unfinished && !confirm(`${unfinished} exercises unfinished. Finish anyway?`))return;
  document.getElementById("coreModal").classList.remove("hidden");
}
function finishWithCore(kind){
  const w=state.active; w.endedAt=Date.now(); w.duration=Math.round((w.endedAt-w.startedAt)/60000);
  w.core=kind==="skip"?[]:CORE[kind].map(x=>({name:x[0],target:x[1]}));
  if(kind==="skip")state.skippedCore++;else state.skippedCore=0;
  w.items.forEach(x=>{if(x.done){
    const rec={next:x.next,coach:x.coach,lastSets:x.sets,lastWeight:x.weight};
    state.lastWeights[x.name]=rec;
    state.gymWeights[w.gym+"::"+x.name]=rec;
  }});
  state.history.unshift(w); state.active=null; state.rotationIndex=(state.rotationIndex+1)%ROTATION.length; save(); render(); toast("Workout saved");
}
function setVal(id,setIdx,val){const x=state.active.items.find(i=>i.id===id);x.sets[setIdx]=val===""?null:Number(val);save()}
function changeWeight(id,val){const x=state.active.items.find(i=>i.id===id);x.weight=Number(val);save()}
function changeWorkoutDate(val){
  if(!state.active || !val) return;
  state.active.date=val;
  save();
}
function rebuildPerformance(){
  state.lastWeights={};
  state.gymWeights={};
  [...state.history].reverse().forEach(w=>{
    (w.items||[]).forEach(x=>{
      if(x.done){
        const rec={next:x.next,coach:x.coach,lastSets:x.sets,lastWeight:x.weight};
        state.lastWeights[x.name]=rec;
        state.gymWeights[(w.gym||"Unknown")+"::"+x.name]=rec;
      }
    });
  });
}
function editHistory(index){
  const original=state.history[index];
  if(!original) return;
  state.active=JSON.parse(JSON.stringify(original));
  state.active.editingIndex=index;
  state.active.items=(state.active.items||[]).map(x=>({
    ...x,
    id:x.id||crypto.randomUUID(),
    sets:Array.isArray(x.sets)?x.sets:[null,null,null],
    target:Number(x.target||0),
    weight:Number(x.weight||0),
    inc:Number(x.inc||0),
    done:Boolean(x.done),
    skipped:Boolean(x.skipped)
  }));
  page="today";
  save();
  render();
}
function saveEditedWorkout(){
  const w=state.active;
  if(!w || w.editingIndex===undefined || w.editingIndex===null) return;
  w.items.forEach(x=>{
    if(x.done && Array.isArray(x.sets) && x.sets.every(v=>v!==null && v!=="")){
      const min=Math.min(...x.sets.map(Number));
      x.next=x.inc===0?x.weight:(min>=x.target?Number(x.weight)+Number(x.inc):Number(x.weight));
      x.coach=min>=x.target?(x.inc===0?"ADD REPS":"INCREASE"):"REPEAT";
    }
  });
  const index=w.editingIndex;
  delete w.editingIndex;
  state.history[index]=w;
  state.active=null;
  rebuildPerformance();
  save();
  page="history";
  render();
  toast("Workout updated");
}
function deleteHistory(index){
  if(!confirm("Delete this workout permanently?")) return;
  state.history.splice(index,1);
  rebuildPerformance();
  save();
  render();
}
function cancelWorkout(){
  const editing=state.active && state.active.editingIndex!==undefined;
  if(confirm(editing?"Close without saving changes?":"Discard active workout?")){
    state.active=null;save();render();
  }
}
function logBodyweight(){const v=prompt("Bodyweight");if(v){state.bodyweight.unshift({date:today(),value:Number(v)});save();render()}}
function addGym(){const n=prompt("Gym name");if(n){state.customGyms.push(n);state.gym=n;save();render()}}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="flexppl-backup.json";a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();toast("Backup restored")}catch{alert("Invalid backup")}};r.readAsText(f)}
function resetData(){if(confirm("Delete all FlexPPL data?")){localStorage.removeItem("flexppl");state=structuredClone(DEFAULT_STATE);render()}}
function render(){document.getElementById("app").innerHTML=`
<header><div class="brand">FlexPPL</div><div class="pill">${state.gym}</div></header>
${page==="today"?renderToday():page==="history"?renderHistory():page==="progress"?renderProgress():renderSettings()}
<div class="tabs"><div class="inner">
<button class="tab ${page==="today"?"active":""}" onclick="page='today';render()">Today</button>
<button class="tab ${page==="history"?"active":""}" onclick="page='history';render()">History</button>
<button class="tab ${page==="progress"?"active":""}" onclick="page='progress';render()">Progress</button>
<button class="tab ${page==="settings"?"active":""}" onclick="page='settings';render()">Settings</button>
</div></div>`}
function renderToday(){
 if(!state.active){
   const last=state.history[0];
   const lastDate=last?new Date(last.date+"T12:00:00"):"";
   const daysAgo=last?Math.max(0,Math.floor((Date.now()-lastDate.getTime())/86400000)):null;
   const streak=state.history.reduce((n,w,i,a)=>{
     if(i===0)return 1;
     const d1=new Date(a[i-1].date+"T12:00:00"),d2=new Date(w.date+"T12:00:00");
     return (d1-d2)<=3*86400000?n+1:n;
   },state.history.length?0:0);
   return `
 <section class="card hero"><div class="muted">Today's workout</div><h1>${nextWorkout()}</h1>
 <p class="muted">${new Date().toLocaleDateString()} · ${state.gym}</p>
 ${last?`<div class="row" style="margin:10px 0 16px">
   <span class="pill">Last: ${last.duration||0} min</span>
   <span class="pill">${daysAgo===0?"Last done today":`Last done ${daysAgo} day${daysAgo===1?"":"s"} ago`}</span>
   <span class="pill">🔥 ${streak} workout${streak===1?"":"s"}</span>
 </div>`:""}
 <button class="btn primary wide" onclick="startWorkout()">Start Today's Workout</button>
 <div class="row" style="margin-top:10px"><button class="btn secondary" onclick="logBodyweight()">Quick Log Bodyweight</button>
 <select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select></div></section>
 <div class="grid"><div class="stat"><span class="muted">Last workout</span><b>${last?.name||"None yet"}</b></div><div class="stat"><span class="muted">Bodyweight</span><b>${state.bodyweight[0]?.value||"—"}</b></div></div>
 <div class="section-title">Choose another workout</div><div class="row">${ROTATION.map(x=>`<button class="btn secondary mini" onclick="startWorkout('${x}')">${x}</button>`).join("")}</div>`;
 }
 const a=state.active;
 const upcoming=a.items.filter(x=>!x.done&&!x.skipped);
 const completed=a.items.filter(x=>x.done||x.skipped);
 return `<section class="card"><div class="row" style="justify-content:space-between"><div>
 <div class="muted">${a.gym} · ${a.busy==="3"?"Packed":a.busy==="1"?"Empty":"Normal"}</div>
 <h1 style="margin:3px 0">${a.name}</h1>
 <label class="muted" style="display:block;margin-top:10px">Workout date</label>
 <input type="date" value="${a.date}" onchange="changeWorkoutDate(this.value)" style="margin-top:5px">
 </div><button class="btn danger mini" onclick="cancelWorkout()">${a.editingIndex!==undefined?"Close":"Cancel"}</button></div></section>
 ${upcoming.map(x=>renderExercise(x)).join("")}
 ${completed.length?`<details class="completed-section"><summary>Completed / skipped (${completed.length})</summary>${completed.map(x=>renderExercise(x,true)).join("")}</details>`:""}
 ${a.editingIndex!==undefined?`<button class="btn primary wide" onclick="saveEditedWorkout()">Save Changes</button>`:`<button class="btn primary wide" onclick="finishWorkout()">Finish Workout</button>`}
 <div id="coreModal" class="card hidden"><h2>Add core?</h2><p class="muted">${state.skippedCore>=2?"You skipped core recently. A 5-minute finisher is enough.":""}</p>
 <div class="core-choice"><button class="btn secondary" onclick="finishWithCore('skip')">Skip</button><button class="btn secondary" onclick="finishWithCore('5')">5 min</button><button class="btn primary" onclick="finishWithCore('10')">10 min</button></div></div>`;
}
function renderExercise(x,collapsed=false){
 const status=x.done?(x.coach==="INCREASE"||x.coach==="ADD REPS"?"status-increase":"status-repeat"):(x.coach==="REPEAT"?"status-repeat":"status-first");
 if(collapsed){
   return `<section class="card collapsed-done ${status}" onclick="this.classList.toggle('expanded')">
     <div class="done-summary">
       <div><div class="done-title">${x.skipped?"Skipped: ":"✓ "}${x.name}</div>
       <div class="muted">${x.skipped?"Not completed":`${x.weight} × ${x.sets.join(" / ")} · Next ${x.next}`}</div></div>
       <button class="btn secondary mini" onclick="event.stopPropagation();xDoneToggle('${x.id}')">Edit</button>
     </div>
   </section>`;
 }
 return `<section class="card exercise ${status}">
 <div class="order-controls">
   <button class="btn secondary mini" onclick="moveItem('${x.id}',-1)" aria-label="Move up">↑</button>
   <button class="btn secondary mini" onclick="moveItem('${x.id}',1)" aria-label="Move down">↓</button>
 </div>
 <div class="exercise-head"><div><h3>${x.name}</h3><div class="meta">Goal ${x.target} reps · ${x.coach||"First log"}</div></div></div>
 <div class="entry-grid">
   <label><span class="field-label">Weight</span><input type="number" value="${x.weight}" onchange="changeWeight('${x.id}',this.value)" aria-label="Weight"></label>
   ${[0,1,2].map(i=>`<label><span class="field-label">S${i+1}</span><input type="number" inputmode="numeric" value="${x.sets[i]??""}" onchange="setVal('${x.id}',${i},this.value)"></label>`).join("")}
 </div>
 <div class="row" style="margin-top:12px">
   <button class="btn swap mini" onclick="swapItem('${x.id}')">Swap</button>
   <button class="btn secondary mini" onclick="skipItem('${x.id}')">Skip</button>
   <button class="btn primary mini" style="margin-left:auto" onclick="completeItem('${x.id}')">Complete</button>
 </div>
 </section>`;
}
function renderHistory(){return `<div class="section-title">Workout history</div><section class="card">${state.history.length?state.history.map((w,index)=>`<div class="history-item">
 <div class="row" style="justify-content:space-between;align-items:flex-start">
   <div><b>${w.name}</b><div class="muted">${w.date} · ${w.gym} · ${w.duration||0} min</div>
   <div>${w.items.filter(x=>x.done).length} completed · ${w.items.filter(x=>x.skipped).length} skipped · Core ${w.core?.length?"yes":"no"}</div></div>
   <div class="row"><button class="btn secondary mini" onclick="editHistory(${index})">Edit</button>
   <button class="btn danger mini" onclick="deleteHistory(${index})">Delete</button></div>
 </div></div>`).join(""):"No workouts yet."}</section>`}
function renderProgress(){
 const completed=state.history.length, volume=state.history.reduce((sum,w)=>sum+w.items.reduce((s,x)=>s+(x.done?Number(x.weight||0)*x.sets.reduce((a,b)=>a+Number(b||0),0):0),0),0);
 const prs=Object.entries(state.lastWeights).sort((a,b)=>a[0].localeCompare(b[0]));
 const bestFor=(name)=>state.history.flatMap(w=>w.items.filter(x=>x.done&&x.name===name).map(x=>Number(x.weight||0))).reduce((m,x)=>Math.max(m,x),0);
 return `<div class="grid"><div class="stat"><span class="muted">Workouts</span><b>${completed}</b></div><div class="stat"><span class="muted">Total volume</span><b>${Math.round(volume).toLocaleString()}</b></div></div>
 <div class="section-title">Strength progress</div><section class="card">${prs.length?prs.map(([n,v])=>`<div class="history-item"><b>${n}</b>
 <div class="grid" style="margin-top:8px">
   <div class="stat"><span class="muted">Current</span><b>${v.lastWeight}</b></div>
   <div class="stat"><span class="muted">Next</span><b>${v.next}</b></div>
 </div>
 <div class="muted" style="margin-top:8px">Best weight: ${bestFor(n)} · Last sets: ${v.lastSets.join(" / ")}</div></div>`).join(""):"Complete a workout to see progress."}</section>
 <div class="section-title">Bodyweight</div><section class="card">${state.bodyweight.length?state.bodyweight.slice(0,12).map(x=>`<div class="history-item"><b>${x.value}</b><span class="muted"> · ${x.date}</span></div>`).join(""):"No bodyweight entries."}</section>`;
}
function renderSettings(){return `<section class="card"><h2>Gym profile</h2><select onchange="state.gym=this.value;save();render()">${state.customGyms.map(g=>`<option ${g===state.gym?"selected":""}>${g}</option>`).join("")}</select> <button class="btn secondary mini" onclick="addGym()">Add gym</button></section>
 <section class="card"><h2>Backup</h2><div class="row"><button class="btn secondary" onclick="exportData()">Export JSON</button><label class="btn secondary">Import JSON<input class="hidden" type="file" accept=".json" onchange="importData(event)"></label></div></section>
 <section class="card"><h2>Data</h2><button class="btn danger" onclick="resetData()">Reset everything</button></section>
 <section class="card"><h2>App version</h2><p class="muted">FlexPPL 0.4 — cleaner cards and completed section</p></section><section class="card"><h2>Install</h2><p class="muted">In Chrome, open the menu and choose <b>Add to Home screen</b> or <b>Install app</b>.</p></section>`}
render();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}
</script>
</body></html>
